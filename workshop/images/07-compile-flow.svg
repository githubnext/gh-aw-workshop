<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-label="Diagram showing how daily-report-status.md is compiled by gh aw compile into daily-report-status.lock.yml which GitHub Actions then executes">
  <!-- Background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Main card -->
  <rect x="40" y="40" width="1120" height="480" rx="12" ry="12" fill="white" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- Title -->
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#24292f">Agentic Workflow Compile Flow</text>
  <text x="600" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#57606a">From human-readable workflow definition to GitHub Actions execution</text>

  <!-- Step 1: Source file box -->
  <rect x="80" y="150" width="220" height="230" rx="10" ry="10" fill="#f6f8fa" stroke="#0969da" stroke-width="2"/>
  <rect x="80" y="150" width="220" height="40" rx="10" ry="10" fill="#0969da"/>
  <rect x="80" y="170" width="220" height="20" fill="#0969da"/>
  <text x="190" y="176" text-anchor="middle" font-family="monospace, sans-serif" font-size="13" font-weight="700" fill="white">daily-report-status.md</text>
  <text x="190" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#57606a">YAML frontmatter</text>
  <rect x="100" y="220" width="180" height="50" rx="5" fill="#ddf4ff" stroke="#0969da" stroke-width="1"/>
  <text x="190" y="240" text-anchor="middle" font-family="monospace" font-size="11" fill="#0969da">---</text>
  <text x="190" y="255" text-anchor="middle" font-family="monospace" font-size="11" fill="#0969da">on: workflow_dispatch</text>
  <text x="190" y="270" text-anchor="middle" font-family="monospace" font-size="11" fill="#0969da">---</text>

  <text x="190" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#57606a">Markdown task brief</text>
  <rect x="100" y="302" width="180" height="60" rx="5" fill="#fff8c5" stroke="#bf8700" stroke-width="1"/>
  <text x="190" y="320" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7d4e00">Read all open issues,</text>
  <text x="190" y="335" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7d4e00">summarize them and</text>
  <text x="190" y="350" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7d4e00">post one comment...</text>

  <text x="190" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-style="italic" fill="#57606a">Human-authored ✏️</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="265" x2="410" y2="265" stroke="#d0d7de" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Compile step box -->
  <rect x="410" y="195" width="200" height="140" rx="10" ry="10" fill="#f3f0ff" stroke="#8250df" stroke-width="2"/>
  <rect x="410" y="195" width="200" height="36" rx="10" ry="10" fill="#8250df"/>
  <rect x="410" y="213" width="200" height="18" fill="#8250df"/>
  <text x="510" y="217" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white">gh aw compile</text>
  <text x="510" y="245" text-anchor="middle" font-family="monospace" font-size="13" fill="#8250df">$ gh aw compile</text>
  <text x="510" y="268" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Validates frontmatter</text>
  <text x="510" y="285" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Injects agent runner</text>
  <text x="510" y="302" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Generates lock file</text>
  <text x="510" y="320" text-anchor="middle" font-family="system-ui" font-size="11" font-style="italic" fill="#57606a">Run in terminal 💻</text>

  <!-- Arrow 2 -->
  <line x1="610" y1="265" x2="720" y2="265" stroke="#d0d7de" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lock file box -->
  <rect x="720" y="150" width="220" height="230" rx="10" ry="10" fill="#f6f8fa" stroke="#1a7f37" stroke-width="2"/>
  <rect x="720" y="150" width="220" height="40" rx="10" ry="10" fill="#1a7f37"/>
  <rect x="720" y="170" width="220" height="20" fill="#1a7f37"/>
  <text x="830" y="176" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">daily-report-status.lock.yml</text>
  <text x="830" y="210" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Full GitHub Actions YAML</text>
  <rect x="740" y="218" width="180" height="100" rx="5" fill="#dafbe1" stroke="#1a7f37" stroke-width="1"/>
  <text x="830" y="238" text-anchor="middle" font-family="monospace" font-size="10" fill="#116329">name: daily-report-status</text>
  <text x="830" y="253" text-anchor="middle" font-family="monospace" font-size="10" fill="#116329">on: workflow_dispatch</text>
  <text x="830" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="#116329">jobs:</text>
  <text x="830" y="283" text-anchor="middle" font-family="monospace" font-size="10" fill="#116329">  agent:</text>
  <text x="830" y="298" text-anchor="middle" font-family="monospace" font-size="10" fill="#116329">    uses: gh-aw/runner</text>
  <text x="830" y="313" text-anchor="middle" font-family="monospace" font-size="10" fill="#116329">    with: ...</text>

  <text x="830" y="355" text-anchor="middle" font-family="system-ui" font-size="11" fill="#57606a">⚠️ Do not edit by hand</text>
  <text x="830" y="372" text-anchor="middle" font-family="system-ui" font-size="11" font-style="italic" fill="#57606a">Auto-generated 🔒</text>

  <!-- Arrow 3 -->
  <line x1="940" y1="265" x2="980" y2="265" stroke="#d0d7de" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- GitHub Actions box -->
  <rect x="980" y="195" width="180" height="140" rx="10" ry="10" fill="#fff0f0" stroke="#cf222e" stroke-width="2"/>
  <rect x="980" y="195" width="180" height="36" rx="10" ry="10" fill="#cf222e"/>
  <rect x="980" y="213" width="180" height="18" fill="#cf222e"/>
  <text x="1070" y="217" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white">GitHub Actions</text>
  <text x="1070" y="248" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Reads lock file</text>
  <text x="1070" y="265" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Launches AI agent</text>
  <text x="1070" y="282" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Executes task brief</text>
  <text x="1070" y="299" text-anchor="middle" font-family="system-ui" font-size="12" fill="#57606a">Calls safe outputs</text>
  <text x="1070" y="320" text-anchor="middle" font-family="system-ui" font-size="11" font-style="italic" fill="#57606a">Triggered on demand ▶️</text>

  <!-- Bottom annotation -->
  <text x="600" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#57606a">
    You author <tspan font-family="monospace" fill="#0969da">daily-report-status.md</tspan> — compile to generate <tspan font-family="monospace" fill="#1a7f37">daily-report-status.lock.yml</tspan> — commit both to your repository
  </text>

  <!-- Number badges -->
  <circle cx="355" cy="245" r="14" fill="#0969da"/>
  <text x="355" y="250" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="white">1</text>

  <circle cx="665" cy="245" r="14" fill="#8250df"/>
  <text x="665" y="250" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="white">2</text>

  <circle cx="960" cy="245" r="14" fill="#1a7f37"/>
  <text x="960" y="250" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="white">3</text>

  <!-- Defs for arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d0d7de"/>
    </marker>
  </defs>
</svg>
