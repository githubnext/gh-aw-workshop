<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Actions tab with getting-started message">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Code</text>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Actions</text>
  <rect x="309" y="88" width="56" height="3" fill="#0969da" rx="2"/>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Getting started panel -->
  <rect x="100" y="115" width="1000" height="390" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <!-- Octocat/rocket illustration placeholder -->
  <circle cx="600" cy="210" r="50" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/>
  <text x="600" y="220" font-family="Arial,sans-serif" font-size="36" text-anchor="middle">🚀</text>
  <text x="600" y="295" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#1f2328" text-anchor="middle">Get started with GitHub Actions</text>
  <text x="600" y="325" font-family="Arial,sans-serif" font-size="14" fill="#57606a" text-anchor="middle">Build, test, and deploy your code. Make code reviews, branch management,</text>
  <text x="600" y="345" font-family="Arial,sans-serif" font-size="14" fill="#57606a" text-anchor="middle">and issue triaging work the way you want.</text>
  <rect x="450" y="380" width="190" height="36" rx="6" fill="#0969da"/>
  <text x="545" y="403" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">New workflow</text>
  <rect x="650" y="380" width="190" height="36" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="745" y="403" font-family="Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle">Skip this and set up a workflow yourself →</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Actions tab with getting-started message</text>

</svg>