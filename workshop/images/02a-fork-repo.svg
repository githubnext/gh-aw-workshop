<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Fork the repository">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Code</text>
  <rect x="30" y="88" width="32" height="3" fill="#0969da" rx="2"/>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Actions</text>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Fork modal -->
  <rect x="300" y="110" width="600" height="380" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="155" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#1f2328" text-anchor="middle">Create a new fork</text>
  <line x1="300" y1="170" x2="900" y2="170" stroke="#d0d7de" stroke-width="1"/>
  <text x="330" y="205" font-family="Arial,sans-serif" font-size="13" fill="#57606a">Owner</text>
  <rect x="330" y="215" width="250" height="34" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="345" y="237" font-family="Arial,sans-serif" font-size="13" fill="#1f2328">your-username</text>
  <text x="600" y="233" font-family="Arial,sans-serif" font-size="16" fill="#57606a" text-anchor="middle">/</text>
  <text x="620" y="205" font-family="Arial,sans-serif" font-size="13" fill="#57606a">Repository name</text>
  <rect x="620" y="215" width="250" height="34" rx="6" fill="#ffffff" stroke="#0969da" stroke-width="2"/>
  <text x="635" y="237" font-family="Arial,sans-serif" font-size="13" fill="#1f2328">gh-aw-workshop</text>
  <text x="330" y="285" font-family="Arial,sans-serif" font-size="13" fill="#57606a">Description (optional)</text>
  <rect x="330" y="295" width="540" height="34" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="330" y="365" font-family="Arial,sans-serif" font-size="13" fill="#1f2328">☑  Copy the main branch only</text>
  <rect x="330" y="415" width="200" height="36" rx="6" fill="#0969da"/>
  <text x="430" y="438" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Create fork</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Fork the repository</text>

</svg>