<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Workflow file committed in the GitHub UI">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Code</text>
  <rect x="30" y="88" width="32" height="3" fill="#0969da" rx="2"/>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Actions</text>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Breadcrumb -->
  <text x="80" y="130" font-family="Arial,sans-serif" font-size="14" fill="#0969da">your-repo</text>
  <text x="170" y="130" font-family="Arial,sans-serif" font-size="14" fill="#57606a">/ .github / workflows /</text>
  <text x="345" y="130" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f2328">hello-agent.md</text>
  <!-- File header -->
  <rect x="60" y="145" width="1080" height="40" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="90" y="170" font-family="Arial,sans-serif" font-size="13" fill="#57606a">1 contributor   · Last commit </text>
  <text x="320" y="170" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1f2328">Add hello-agent workflow</text>
  <text x="600" y="170" font-family="Arial,sans-serif" font-size="13" fill="#57606a">  2 minutes ago</text>
  <rect x="980" y="153" width="140" height="26" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="1050" y="170" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">✏ Edit file</text>
  <!-- Code content -->
  <rect x="60" y="185" width="1080" height="300" rx="0" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="100" y="215" font-family="monospace" font-size="13" fill="#cf222e">---</text>
  <text x="100" y="235" font-family="monospace" font-size="13" fill="#0550ae">name</text><text x="145" y="235" font-family="monospace" font-size="13" fill="#1f2328">: Hello Agent Workflow</text>
  <text x="100" y="255" font-family="monospace" font-size="13" fill="#0550ae">on</text><text x="125" y="255" font-family="monospace" font-size="13" fill="#1f2328">: [workflow_dispatch]</text>
  <text x="100" y="275" font-family="monospace" font-size="13" fill="#cf222e">---</text>
  <text x="100" y="310" font-family="monospace" font-size="13" fill="#57606a"># Hello Agent — workshop step 07</text>
  <text x="100" y="335" font-family="monospace" font-size="13" fill="#1f2328">Run the Hello Agent workflow.</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Workflow file committed in the GitHub UI</text>

</svg>