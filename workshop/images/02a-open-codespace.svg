<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Open Codespace">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Code</text>
  <rect x="30" y="88" width="32" height="3" fill="#0969da" rx="2"/>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Actions</text>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Repo file list -->
  <rect x="60" y="110" width="1080" height="50" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="100" y="142" font-family="Arial,sans-serif" font-size="14" fill="#1f2328">main  ▾</text>
  <!-- Green Code button dropdown -->
  <rect x="860" y="120" width="130" height="30" rx="6" fill="#1f883d"/>
  <text x="880" y="140" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff">⬇ Code  ▾</text>
  <!-- Dropdown panel -->
  <rect x="730" y="155" width="300" height="200" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="880" y="178" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#57606a" text-anchor="middle">Codespaces</text>
  <line x1="730" y1="185" x2="1030" y2="185" stroke="#d0d7de" stroke-width="1"/>
  <rect x="740" y="195" width="280" height="60" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4"/>
  <text x="880" y="225" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">No codespaces</text>
  <text x="880" y="245" font-family="Arial,sans-serif" font-size="11" fill="#57606a" text-anchor="middle">You don't have any codespaces for this repo.</text>
  <rect x="740" y="265" width="280" height="32" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="880" y="286" font-family="Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="middle">+ Create codespace on main</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Open Codespace</text>

</svg>