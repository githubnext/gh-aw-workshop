<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Copilot billing usage dashboard showing AI Credit consumption by feature">
  <!-- Page background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="6" ry="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <!-- URL bar -->
  <rect x="320" y="9" width="560" height="26" rx="13" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="27" font-family="Arial, sans-serif" font-size="13" fill="#57606a" text-anchor="middle">github.com/settings/billing/usage</text>
  <!-- Browser dots -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Left sidebar -->
  <rect x="0" y="44" width="220" height="516" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="20" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#24292f">Settings</text>
  <text x="20" y="110" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Profile</text>
  <text x="20" y="132" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Account</text>
  <text x="20" y="154" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Appearance</text>
  <!-- Billing selected -->
  <rect x="0" y="164" width="220" height="26" fill="#ddf4ff"/>
  <text x="20" y="181" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0969da">Billing and plans</text>
  <text x="20" y="210" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Security</text>
  <text x="20" y="232" font-family="Arial, sans-serif" font-size="12" fill="#57606a">SSH and GPG keys</text>
  <text x="20" y="254" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Notifications</text>
  <text x="20" y="276" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Copilot</text>

  <!-- Main content -->
  <rect x="240" y="56" width="940" height="470" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>

  <!-- Page title -->
  <text x="268" y="92" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#24292f">Usage</text>

  <!-- Sub-nav tabs -->
  <text x="268" y="120" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Summary</text>
  <text x="340" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0969da">Usage</text>
  <line x1="340" y1="124" x2="368" y2="124" stroke="#0969da" stroke-width="2"/>
  <text x="400" y="120" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Budgets &amp; alerts</text>

  <line x1="240" y1="130" x2="1180" y2="130" stroke="#d0d7de" stroke-width="1"/>

  <!-- Section heading -->
  <text x="268" y="158" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#24292f">Copilot usage this cycle</text>
  <text x="268" y="178" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Billing period: Jun 1 – Jun 30, 2025</text>

  <!-- Table header -->
  <rect x="260" y="192" width="900" height="32" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="280" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#24292f">Feature</text>
  <text x="560" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#24292f">AI Credits (AIC) used</text>
  <text x="780" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#24292f">Requests</text>
  <text x="980" y="213" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#24292f">Last used</text>

  <!-- Table rows -->
  <!-- Row 1: Agentic Workflows (highlighted) -->
  <rect x="260" y="224" width="900" height="36" fill="#ddf4ff" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="280" y="247" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0969da">Agentic Workflows</text>
  <text x="560" y="247" font-family="Arial, sans-serif" font-size="13" fill="#24292f">3,420</text>
  <text x="780" y="247" font-family="Arial, sans-serif" font-size="13" fill="#24292f">142</text>
  <text x="980" y="247" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Today</text>

  <!-- Row 2 -->
  <rect x="260" y="260" width="900" height="36" fill="#ffffff" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="280" y="283" font-family="Arial, sans-serif" font-size="13" fill="#24292f">Copilot Chat (IDE)</text>
  <text x="560" y="283" font-family="Arial, sans-serif" font-size="13" fill="#24292f">1,850</text>
  <text x="780" y="283" font-family="Arial, sans-serif" font-size="13" fill="#24292f">620</text>
  <text x="980" y="283" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Today</text>

  <!-- Row 3 -->
  <rect x="260" y="296" width="900" height="36" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="280" y="319" font-family="Arial, sans-serif" font-size="13" fill="#24292f">Copilot Chat (GitHub.com)</text>
  <text x="560" y="319" font-family="Arial, sans-serif" font-size="13" fill="#24292f">940</text>
  <text x="780" y="319" font-family="Arial, sans-serif" font-size="13" fill="#24292f">310</text>
  <text x="980" y="319" font-family="Arial, sans-serif" font-size="13" fill="#57606a">2 days ago</text>

  <!-- Row 4 -->
  <rect x="260" y="332" width="900" height="36" fill="#ffffff" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="280" y="355" font-family="Arial, sans-serif" font-size="13" fill="#24292f">Code completion</text>
  <text x="560" y="355" font-family="Arial, sans-serif" font-size="13" fill="#24292f">0</text>
  <text x="780" y="355" font-family="Arial, sans-serif" font-size="13" fill="#24292f">—</text>
  <text x="980" y="355" font-family="Arial, sans-serif" font-size="13" fill="#57606a">—</text>

  <!-- Total row -->
  <rect x="260" y="368" width="900" height="36" rx="0" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="280" y="391" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#24292f">Total</text>
  <text x="560" y="391" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#24292f">6,210</text>

  <!-- Budget bar -->
  <text x="268" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#24292f">Monthly budget</text>
  <rect x="268" y="444" width="600" height="16" rx="8" fill="#d0d7de"/>
  <rect x="268" y="444" width="373" height="16" rx="8" fill="#0969da"/>
  <text x="878" y="458" font-family="Arial, sans-serif" font-size="12" fill="#57606a">6,210 / 10,000 AIC used (62%)</text>

  <!-- Annotation -->
  <text x="600" y="536" font-family="Arial, sans-serif" font-size="18" fill="#57606a" text-anchor="middle">Copilot billing usage dashboard showing AI Credit consumption by feature</text>
</svg>
