<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"
     role="img" aria-label="Setup path decision diagram: choose between Codespace and Local Terminal based on your environment">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Main card -->
  <rect x="40" y="30" width="1120" height="490" rx="12" ry="12"
        fill="white" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- Title -->
  <text x="600" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="20" font-weight="700" fill="#24292f">Choose Your Setup Path</text>
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#57606a">Pick the environment where you'll run workshop commands — you only need one</text>

  <!-- START node -->
  <rect x="490" y="110" width="220" height="50" rx="25" ry="25"
        fill="#0969da" stroke="none"/>
  <text x="600" y="141" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="600" fill="white">Start Here</text>

  <!-- Arrow down from start -->
  <line x1="600" y1="160" x2="600" y2="188" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="600,190 760,250 600,310 440,250"
           fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <text x="600" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600" fill="#24292f">Where will you</text>
  <text x="600" y="263" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600" fill="#24292f">run commands?</text>

  <!-- Left arrow from diamond -->
  <line x1="440" y1="250" x2="290" y2="250" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">browser /</text>
  <text x="365" y="254" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">Codespace</text>

  <!-- Right arrow from diamond -->
  <line x1="760" y1="250" x2="910" y2="250" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="835" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">local</text>
  <text x="835" y="254" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">terminal</text>

  <!-- Codespace card -->
  <rect x="110" y="195" width="180" height="110" rx="8" ry="8"
        fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="200" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="700" fill="#1a7f37">GitHub Codespace</text>
  <text x="200" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#1a7f37">Runs in your browser</text>
  <text x="200" y="259" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">gh + git + gh-aw</text>
  <text x="200" y="274" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">pre-installed</text>
  <text x="200" y="293" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#1a7f37">★ Recommended for beginners</text>

  <!-- Local card -->
  <rect x="910" y="195" width="180" height="110" rx="8" ry="8"
        fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <text x="1000" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="700" fill="#0969da">Local Terminal</text>
  <text x="1000" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#0969da">Runs on your machine</text>
  <text x="1000" y="259" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">Install: gh CLI ≥ 2.40</text>
  <text x="1000" y="274" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">and Git</text>
  <text x="1000" y="293" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#0969da">For experienced devs</text>

  <!-- Arrows down from cards -->
  <line x1="200" y1="305" x2="200" y2="368" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1000" y1="305" x2="1000" y2="368" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Adventure A box -->
  <rect x="110" y="370" width="180" height="54" rx="8" ry="8"
        fill="#f6f8fa" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="396" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600" fill="#1a7f37">Adventure A →</text>
  <text x="200" y="413" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">02a-setup-codespace.md</text>

  <!-- Adventure B box -->
  <rect x="910" y="370" width="180" height="54" rx="8" ry="8"
        fill="#f6f8fa" stroke="#0969da" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="1000" y="396" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600" fill="#0969da">Adventure B →</text>
  <text x="1000" y="413" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#57606a">02b-setup-local.md</text>

  <!-- Convergence arrows -->
  <line x1="200" y1="424" x2="200" y2="460" stroke="#57606a" stroke-width="2"/>
  <line x1="200" y1="460" x2="530" y2="460" stroke="#57606a" stroke-width="2"/>
  <line x1="1000" y1="424" x2="1000" y2="460" stroke="#57606a" stroke-width="2"/>
  <line x1="1000" y1="460" x2="670" y2="460" stroke="#57606a" stroke-width="2"/>
  <line x1="530" y1="460" x2="670" y2="460" stroke="#57606a" stroke-width="2"/>
  <line x1="600" y1="460" x2="600" y2="490" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Final box -->
  <rect x="460" y="492" width="280" height="20" rx="4" ry="4" fill="none"/>
  <text x="600" y="507" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#57606a">Both paths lead to Step 3: Create Your Repository →</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#57606a"/>
    </marker>
  </defs>
</svg>
