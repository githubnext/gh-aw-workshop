<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Conditional logic flow: shell step writes commit count to GITHUB_OUTPUT, the if condition evaluates it, then either skips or runs the agent job">

  <!-- Background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Title -->
  <text x="600" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#24292f" text-anchor="middle">Conditional Logic Flow</text>
  <text x="600" y="64" font-family="Arial,sans-serif" font-size="13" fill="#57606a" text-anchor="middle">How a deterministic shell step gates the agentic job</text>

  <!-- Step 1: Shell step box -->
  <rect x="60" y="120" width="220" height="110" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="60" y="120" width="220" height="32" rx="8" fill="#0969da"/>
  <rect x="60" y="136" width="220" height="16" fill="#0969da"/>
  <text x="170" y="140" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Shell Step</text>
  <text x="170" y="165" font-family="monospace" font-size="11" fill="#24292f" text-anchor="middle">git log --since="24h"</text>
  <text x="170" y="182" font-family="monospace" font-size="11" fill="#24292f" text-anchor="middle">| wc -l</text>
  <text x="170" y="203" font-family="Arial,sans-serif" font-size="11" fill="#57606a" text-anchor="middle">id: recent</text>

  <!-- Arrow 1: shell step → GITHUB_OUTPUT -->
  <line x1="280" y1="175" x2="365" y2="175" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-light)"/>

  <!-- GITHUB_OUTPUT box -->
  <rect x="365" y="140" width="200" height="70" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="365" y="140" width="200" height="28" rx="8" fill="#f6f8fa"/>
  <rect x="365" y="154" width="200" height="14" fill="#f6f8fa"/>
  <text x="465" y="157" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#57606a" text-anchor="middle">$GITHUB_OUTPUT</text>
  <text x="465" y="182" font-family="monospace" font-size="12" fill="#0969da" text-anchor="middle">commit_count=3</text>
  <text x="465" y="200" font-family="Arial,sans-serif" font-size="10" fill="#57606a" text-anchor="middle">steps.recent.outputs.commit_count</text>

  <!-- Arrow 2: output → if condition -->
  <line x1="565" y1="175" x2="650" y2="175" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-light)"/>

  <!-- if: condition diamond -->
  <polygon points="760,130 870,175 760,220 650,175" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="760" y="169" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#24292f" text-anchor="middle">if: condition</text>
  <text x="760" y="187" font-family="monospace" font-size="10" fill="#0969da" text-anchor="middle">count != '0'</text>

  <!-- Arrow 3a: true → agent job -->
  <line x1="870" y1="175" x2="960" y2="175" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-light)"/>
  <text x="915" y="167" font-family="Arial,sans-serif" font-size="11" fill="#1a7f37" text-anchor="middle">true</text>

  <!-- Agent job box -->
  <rect x="960" y="130" width="190" height="90" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="960" y="130" width="190" height="30" rx="8" fill="#1a7f37"/>
  <rect x="960" y="146" width="190" height="14" fill="#1a7f37"/>
  <text x="1055" y="149" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">✅ Agent Job Runs</text>
  <text x="1055" y="178" font-family="Arial,sans-serif" font-size="12" fill="#24292f" text-anchor="middle">AI processes commits</text>
  <text x="1055" y="196" font-family="Arial,sans-serif" font-size="12" fill="#24292f" text-anchor="middle">and posts report</text>

  <!-- Arrow 3b: false → skip -->
  <line x1="760" y1="220" x2="760" y2="300" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-light)"/>
  <text x="773" y="265" font-family="Arial,sans-serif" font-size="11" fill="#9a6700" text-anchor="start">false</text>

  <!-- Skip box -->
  <rect x="660" y="300" width="200" height="80" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="660" y="300" width="200" height="28" rx="8" fill="#6e7781"/>
  <rect x="660" y="314" width="200" height="14" fill="#6e7781"/>
  <text x="760" y="320" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">⏭ Agent Job Skipped</text>
  <text x="760" y="350" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">No commits — no report</text>
  <text x="760" y="368" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">saved AI tokens</text>

  <!-- Step numbering badges -->
  <circle cx="106" cy="90" r="13" fill="#0969da"/>
  <text x="106" y="95" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <circle cx="465" cy="90" r="13" fill="#0969da"/>
  <text x="465" y="95" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  <circle cx="760" cy="90" r="13" fill="#0969da"/>
  <text x="760" y="95" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>

  <!-- Step labels -->
  <text x="106" y="113" font-family="Arial,sans-serif" font-size="11" fill="#57606a" text-anchor="middle">Gather context</text>
  <text x="465" y="113" font-family="Arial,sans-serif" font-size="11" fill="#57606a" text-anchor="middle">Expose as output</text>
  <text x="760" y="113" font-family="Arial,sans-serif" font-size="11" fill="#57606a" text-anchor="middle">Evaluate condition</text>

  <!-- Bottom annotation -->
  <text x="600" y="470" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">Deterministic steps run first; the agent job is gated by the evaluated output value.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-light" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#57606a"/>
    </marker>
  </defs>
</svg>
