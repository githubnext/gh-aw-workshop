<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Daily repo status workflow output</title>
  <desc id="desc">A terminal-style screenshot showing a generated daily repository status report with pull request, issue, CI, commit, and discussion summaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="#e5e7eb" />
  <rect x="110" y="70" width="980" height="580" rx="22" fill="url(#bg)" />
  <rect x="110" y="70" width="980" height="52" rx="22" fill="#1f2937" />
  <circle cx="152" cy="96" r="8" fill="#f87171" />
  <circle cx="180" cy="96" r="8" fill="#fbbf24" />
  <circle cx="208" cy="96" r="8" fill="#34d399" />
  <text x="260" y="103" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">daily-repo-status · latest run</text>
  <text x="155" y="170" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34">📊 Daily Repo Status — 2025-07-10</text>
  <text x="155" y="220" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">══════════════════════════════════</text>
  <text x="155" y="285" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">🔀 Open pull requests:  3</text>
  <text x="155" y="335" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">🐛 Open issues:         7  (2 labeled "bug")</text>
  <text x="155" y="385" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">✅ CI status:           passing</text>
  <text x="155" y="435" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">📝 Last commit:         "Fix login timeout" — 6 hours ago</text>
  <text x="155" y="485" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">💬 New discussion:      "RFC: Add dark mode" — 14 replies</text>
  <text x="155" y="565" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">Everything looks healthy. One PR has been open for 14 days</text>
  <text x="155" y="610" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">and might need a nudge. 👀</text>
</svg>
