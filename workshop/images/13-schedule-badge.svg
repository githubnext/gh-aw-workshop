<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Scheduled workflow badge visible in the Actions sidebar">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Code</text>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Actions</text>
  <rect x="309" y="88" width="56" height="3" fill="#0969da" rx="2"/>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Left sidebar with schedule badge -->
  <rect x="60" y="105" width="280" height="400" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="80" y="135" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f2328">Workflows</text>
  <rect x="60" y="145" width="280" height="36" fill="#ddf4ff" rx="0"/>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="13" fill="#0969da">⚡ Daily Repo Status</text>
  <!-- Badge: clock icon + Scheduled -->
  <rect x="175" y="152" width="90" height="22" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="220" y="167" font-family="Arial,sans-serif" font-size="11" fill="#57606a" text-anchor="middle">🕐 Scheduled</text>
  <text x="85" y="215" font-family="Arial,sans-serif" font-size="13" fill="#57606a">All workflows</text>
  <!-- Main panel -->
  <rect x="360" y="105" width="780" height="400" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="390" y="135" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#1f2328">Daily Repo Status</text>
  <rect x="875" y="115" width="230" height="34" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="990" y="137" font-family="Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="middle">🕐 Next run: tomorrow 08:00 UTC</text>
  <line x1="360" y1="150" x2="1140" y2="150" stroke="#d0d7de" stroke-width="1"/>
  <!-- Run row -->
  <rect x="370" y="160" width="760" height="52" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="405" cy="186" r="12" fill="#1a7f37"/>
  <text x="405" y="192" font-family="Arial,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">✓</text>
  <text x="432" y="182" font-family="Arial,sans-serif" font-size="14" fill="#1f2328">Daily Repo Status</text>
  <text x="432" y="202" font-family="Arial,sans-serif" font-size="12" fill="#57606a">🕐 Scheduled  ·  main  ·  completed 2 hours ago  ·  1m 12s</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Scheduled workflow badge visible in the Actions sidebar</text>

</svg>