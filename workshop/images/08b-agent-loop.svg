<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-label="Agent execution loop: Planning leads to a Tool Call, which returns a Result; the agent may loop back to plan again or finish with Done">
  <!-- Background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Main card -->
  <rect x="40" y="40" width="1120" height="480" rx="12" ry="12" fill="white" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- Title -->
  <text x="600" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#24292f" text-anchor="middle">Agent Execution Loop</text>
  <text x="600" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#57606a" text-anchor="middle">What happens inside a single workflow run</text>

  <!-- ── Defs ── -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#57606a"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a7f37"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0969da"/>
    </marker>
  </defs>

  <!-- ── Stage 1: Planning ── -->
  <rect x="72" y="200" width="180" height="90" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <circle cx="100" cy="223" r="13" fill="#0969da"/>
  <text x="100" y="228" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="162" y="237" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0969da" text-anchor="middle">🤔 Planning</text>
  <text x="162" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Agent reads brief</text>
  <text x="162" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">and decides next action</text>

  <!-- Arrow 1→2 -->
  <line x1="252" y1="245" x2="330" y2="245" stroke="#57606a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Stage 2: Tool Call ── -->
  <rect x="330" y="200" width="200" height="90" rx="10" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <circle cx="360" cy="223" r="13" fill="#bf8700"/>
  <text x="360" y="228" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="430" y="237" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#bf8700" text-anchor="middle">🔧 Tool Call</text>
  <text x="430" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Calls a GitHub tool</text>
  <text x="430" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">e.g. github.list_issues</text>

  <!-- Arrow 2→3 -->
  <line x1="530" y1="245" x2="618" y2="245" stroke="#57606a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Stage 3: Result ── -->
  <rect x="618" y="200" width="200" height="90" rx="10" fill="#eafae8" stroke="#1a7f37" stroke-width="1.5"/>
  <circle cx="648" cy="223" r="13" fill="#1a7f37"/>
  <text x="648" y="228" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="718" y="237" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1a7f37" text-anchor="middle">📥 Result</text>
  <text x="718" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Tool returns data</text>
  <text x="718" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">e.g. 3 issues found</text>

  <!-- ── Loop back arrow: Result → Planning ── -->
  <!-- Curved path going below the boxes -->
  <path d="M718 290 Q718 390 430 390 Q162 390 162 290" fill="none" stroke="#8250df" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="430" y="408" font-family="system-ui, sans-serif" font-size="12" fill="#8250df" text-anchor="middle" font-style="italic">loop: plan again if more actions needed</text>

  <!-- Arrow 3→4 (Done) -->
  <line x1="818" y1="245" x2="906" y2="245" stroke="#57606a" stroke-width="2" marker-end="url(#arr)"/>
  <!-- condition label -->
  <text x="862" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#57606a" text-anchor="middle" font-style="italic">finished</text>

  <!-- ── Stage 4: Done ── -->
  <rect x="906" y="200" width="180" height="90" rx="10" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
  <circle cx="934" cy="223" r="13" fill="#1a7f37"/>
  <text x="934" y="228" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="996" y="237" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1a7f37" text-anchor="middle">✅ Done</text>
  <text x="996" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Safe-output written;</text>
  <text x="996" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">run completes</text>

  <!-- ── Log strip ── -->
  <rect x="72" y="446" width="1056" height="52" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="96" y="466" font-family="ui-monospace, monospace" font-size="11" fill="#24292f">🤔 Planning...  Searching for open issues</text>
  <text x="96" y="484" font-family="ui-monospace, monospace" font-size="11" fill="#24292f">🔧 Tool call:   github.list_issues</text>
  <text x="400" y="466" font-family="ui-monospace, monospace" font-size="11" fill="#24292f">📥 Result:      3 issues found</text>
  <text x="400" y="484" font-family="ui-monospace, monospace" font-size="11" fill="#24292f">🤔 Thinking...  Issue #4 has the most 👍 reactions</text>
  <text x="800" y="466" font-family="ui-monospace, monospace" font-size="11" fill="#24292f">🔧 Tool call:   github.add_comment</text>
  <text x="800" y="484" font-family="ui-monospace, monospace" font-size="11" fill="#24292f">✅ Done</text>

  <!-- Annotation -->
  <text x="600" y="435" font-family="system-ui, sans-serif" font-size="12" fill="#57606a" text-anchor="middle">Actual log lines from a run — each emoji maps to a stage above</text>

</svg>
