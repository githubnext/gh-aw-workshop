<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Run workflow confirmation dropdown">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Code</text>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Actions</text>
  <rect x="309" y="88" width="56" height="3" fill="#0969da" rx="2"/>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Left sidebar -->
  <rect x="60" y="105" width="240" height="400" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="80" y="135" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f2328">Workflows</text>
  <rect x="60" y="145" width="240" height="36" fill="#ddf4ff" rx="0"/>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="13" fill="#0969da">⚡ Daily Report Status Workflow</text>
  <!-- Main panel -->
  <rect x="320" y="105" width="820" height="400" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="350" y="135" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#1f2328">Daily Report Status Workflow</text>
  <!-- Run workflow dropdown open -->
  <rect x="950" y="115" width="160" height="34" rx="6" fill="#0969da"/>
  <text x="1030" y="137" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Run workflow ▾</text>
  <!-- Dropdown panel -->
  <rect x="870" y="153" width="260" height="160" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="890" y="178" font-family="Arial,sans-serif" font-size="13" fill="#57606a">Use workflow from</text>
  <rect x="885" y="185" width="230" height="32" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="900" y="205" font-family="Arial,sans-serif" font-size="13" fill="#1f2328">Branch: main ▾</text>
  <line x1="870" y1="225" x2="1130" y2="225" stroke="#d0d7de" stroke-width="1"/>
  <rect x="885" y="240" width="230" height="34" rx="6" fill="#1f883d"/>
  <text x="1000" y="262" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Run workflow</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Run workflow confirmation dropdown</text>

</svg>