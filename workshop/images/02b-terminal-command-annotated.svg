<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Terminal command anatomy">
  <rect width="1200" height="760" fill="#f6f8fa"/>
  <rect x="90" y="90" width="920" height="520" rx="16" fill="#0d1117"/>
  <rect x="90" y="90" width="920" height="44" rx="16" fill="#21262d"/>
  <text x="130" y="195" fill="#7ee787" font-family="monospace" font-size="30">student@machine:~/gh-aw-workshop$</text>
  <text x="130" y="245" fill="#f0f6fc" font-family="monospace" font-size="30">gh --version</text>
  <text x="130" y="310" fill="#79c0ff" font-family="monospace" font-size="30">gh version 2.80.0</text>

  <rect x="1040" y="150" width="120" height="40" rx="8" fill="#1f6feb"/>
  <text x="1050" y="178" fill="#ffffff" font-family="Arial, sans-serif" font-size="24">Prompt</text>
  <line x1="1040" y1="172" x2="850" y2="172" stroke="#1f6feb" stroke-width="4"/>

  <rect x="1030" y="220" width="130" height="40" rx="8" fill="#bf8700"/>
  <text x="1040" y="248" fill="#ffffff" font-family="Arial, sans-serif" font-size="24">Command</text>
  <line x1="1030" y1="242" x2="820" y2="242" stroke="#bf8700" stroke-width="4"/>

  <rect x="1050" y="286" width="110" height="40" rx="8" fill="#1a7f37"/>
  <text x="1060" y="314" fill="#ffffff" font-family="Arial, sans-serif" font-size="24">Output</text>
  <line x1="1050" y1="308" x2="820" y2="308" stroke="#1a7f37" stroke-width="4"/>
</svg>
