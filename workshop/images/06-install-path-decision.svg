<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"
     role="img" aria-label="Installation path decision: choose Codespace terminal, local terminal, or GitHub UI, all leading to Step 7">
  <!-- Background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Main card -->
  <rect x="40" y="40" width="1120" height="480" rx="12" ry="12"
        fill="white" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- Title -->
  <text x="600" y="82" font-family="ui-sans-serif,system-ui,sans-serif" font-size="20" font-weight="700"
        fill="#24292f" text-anchor="middle">Step 6 — Choose Your Installation Path</text>

  <!-- ── START node ── -->
  <rect x="488" y="108" width="224" height="52" rx="26" fill="#0969da"/>
  <text x="600" y="130" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600"
        fill="white" text-anchor="middle">Start: Install gh-aw</text>
  <text x="600" y="149" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12"
        fill="#cae8ff" text-anchor="middle">Where will you work?</text>

  <!-- Arrow from Start down to branch point -->
  <line x1="600" y1="160" x2="600" y2="192" stroke="#57606a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Branch diamond -->
  <polygon points="600,192 640,222 600,252 560,222" fill="#f6f8fa" stroke="#57606a" stroke-width="1.5"/>
  <text x="600" y="220" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12"
        fill="#57606a" text-anchor="middle">Your setup?</text>
  <text x="600" y="236" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12"
        fill="#57606a" text-anchor="middle"> </text>

  <!-- Defs for arrowhead -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#57606a"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- Left arrow: Codespace -->
  <path d="M560,222 H210 V296" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="385" y="214" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a" text-anchor="middle">Codespace /</text>
  <text x="385" y="228" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a" text-anchor="middle">CCA user</text>

  <!-- Center arrow: Local -->
  <line x1="600" y1="252" x2="600" y2="296" stroke="#57606a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="625" y="278" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a">Local terminal</text>

  <!-- Right arrow: UI -->
  <path d="M640,222 H990 V296" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="815" y="214" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a" text-anchor="middle">Browser /</text>
  <text x="815" y="228" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a" text-anchor="middle">no terminal</text>

  <!-- PATH A: Codespace Terminal -->
  <rect x="100" y="296" width="220" height="80" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <text x="210" y="322" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700"
        fill="#0969da" text-anchor="middle">Step 6a</text>
  <text x="210" y="341" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12"
        fill="#24292f" text-anchor="middle">Codespace Terminal</text>
  <text x="210" y="358" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a" text-anchor="middle">gh extension install …</text>

  <!-- Chip A -->
  <rect x="140" y="268" width="140" height="22" rx="11" fill="#0969da"/>
  <text x="210" y="283" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600"
        fill="white" text-anchor="middle">Install gh-aw extension</text>

  <!-- PATH B: Local Terminal -->
  <rect x="490" y="296" width="220" height="80" rx="8" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <text x="600" y="322" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700"
        fill="#bf8700" text-anchor="middle">Step 6b</text>
  <text x="600" y="341" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12"
        fill="#24292f" text-anchor="middle">Local Terminal</text>
  <text x="600" y="358" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a" text-anchor="middle">gh already set up locally</text>

  <!-- Chip B -->
  <rect x="530" y="268" width="140" height="22" rx="11" fill="#bf8700"/>
  <text x="600" y="283" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600"
        fill="white" text-anchor="middle">Install gh-aw extension</text>

  <!-- PATH C: GitHub UI -->
  <rect x="880" y="296" width="220" height="80" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1.5"/>
  <text x="990" y="322" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700"
        fill="#8250df" text-anchor="middle">Step 6c</text>
  <text x="990" y="341" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12"
        fill="#24292f" text-anchor="middle">GitHub UI Path</text>
  <text x="990" y="358" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11"
        fill="#57606a" text-anchor="middle">No installation needed</text>

  <!-- Chip C badge -->
  <rect x="920" y="268" width="140" height="22" rx="11" fill="#8250df"/>
  <text x="990" y="283" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600"
        fill="white" text-anchor="middle">Browser only ✓</text>

  <!-- Converge arrows -->
  <path d="M210,376 V420 H600 V440" stroke="#1a7f37" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <line x1="600" y1="376" x2="600" y2="440" stroke="#1a7f37" stroke-width="2" marker-end="url(#arr-green)"/>
  <path d="M990,376 V420 H600 V440" stroke="#1a7f37" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>

  <!-- STEP 7 node -->
  <rect x="460" y="440" width="280" height="52" rx="26" fill="#1a7f37"/>
  <text x="600" y="462" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700"
        fill="white" text-anchor="middle">Step 7: Write Your First</text>
  <text x="600" y="481" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700"
        fill="white" text-anchor="middle">Agentic Workflow</text>

  <!-- Footer annotation -->
  <text x="600" y="536" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12"
        fill="#57606a" text-anchor="middle">All three paths converge at Step 7 — choose the one that matches how you're working today.</text>
</svg>
