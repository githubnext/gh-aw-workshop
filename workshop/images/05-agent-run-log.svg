<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" role="img" aria-label="Animated agent run log showing the agent reasoning, calling tools, and posting a comment">
  <title>Agentic workflow in action — agent run log</title>
  <desc>A terminal-style log showing an AI agent starting, reading a task brief, calling list_issues and list_pull_requests tools, reasoning about results, generating a report, and posting a comment to GitHub.</desc>

  <style>
    .line { opacity: 0; }
    .line1  { animation: fadein 0.4s 0.3s forwards; }
    .line2  { animation: fadein 0.4s 0.9s forwards; }
    .line3  { animation: fadein 0.4s 1.5s forwards; }
    .line4  { animation: fadein 0.4s 2.1s forwards; }
    .line5  { animation: fadein 0.4s 2.7s forwards; }
    .line6  { animation: fadein 0.4s 3.3s forwards; }
    .line7  { animation: fadein 0.4s 3.9s forwards; }
    .line8  { animation: fadein 0.4s 4.5s forwards; }
    .line9  { animation: fadein 0.4s 5.1s forwards; }
    .line10 { animation: fadein 0.4s 5.7s forwards; }
    .line11 { animation: fadein 0.4s 6.3s forwards; }
    .line12 { animation: fadein 0.4s 6.9s forwards; }
    .cursor { animation: blink 1s 0s infinite; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink  { 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
  </style>

  <!-- Terminal window background -->
  <rect width="860" height="480" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="40" rx="10" fill="#161b22"/>
  <rect x="0" y="20" width="860" height="20" fill="#161b22"/>
  <circle cx="22" cy="20" r="7" fill="#ff5f57"/>
  <circle cx="46" cy="20" r="7" fill="#febc2e"/>
  <circle cx="70" cy="20" r="7" fill="#28c840"/>
  <text x="430" y="25" font-family="Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Actions › Daily Repo Status › Run #7</text>

  <!-- Log lines -->
  <!-- Line 1: agent start -->
  <g class="line line1">
    <text x="30" y="76" font-family="monospace" font-size="13" fill="#8b949e">▶  run-agent</text>
    <rect x="22" y="83" width="816" height="1" fill="#21262d"/>
  </g>

  <!-- Line 2: task brief -->
  <g class="line line2">
    <text x="44" y="106" font-family="monospace" font-size="13" fill="#3fb950">▼  Running agent: Daily Repo Status</text>
  </g>

  <!-- Line 3: reading brief -->
  <g class="line line3">
    <text x="64" y="130" font-family="monospace" font-size="12" fill="#c9d1d9">  📋 Reading task brief...</text>
  </g>

  <!-- Line 4: tool call list_issues -->
  <g class="line line4">
    <text x="64" y="154" font-family="monospace" font-size="12" fill="#c9d1d9">  🔍 Calling tool: <tspan fill="#79c0ff">list_issues</tspan><tspan fill="#c9d1d9"> (state=open)</tspan></text>
  </g>

  <!-- Line 5: tool result -->
  <g class="line line5">
    <text x="64" y="178" font-family="monospace" font-size="12" fill="#8b949e">      → 7 open issues found (3 labeled high-priority)</text>
  </g>

  <!-- Line 6: tool call list_pull_requests -->
  <g class="line line6">
    <text x="64" y="202" font-family="monospace" font-size="12" fill="#c9d1d9">  🔍 Calling tool: <tspan fill="#79c0ff">list_pull_requests</tspan><tspan fill="#c9d1d9"> (state=open)</tspan></text>
  </g>

  <!-- Line 7: tool result -->
  <g class="line line7">
    <text x="64" y="226" font-family="monospace" font-size="12" fill="#8b949e">      → 4 open PRs (1 stale &gt; 14 days, 2 awaiting review)</text>
  </g>

  <!-- Line 8: reasoning -->
  <g class="line line8">
    <text x="64" y="258" font-family="monospace" font-size="12" fill="#e3b341">  💭 Agent reasoning:</text>
    <text x="64" y="278" font-family="monospace" font-size="12" fill="#8b949e">      "I'll group issues by priority and flag the stale PR for action."</text>
  </g>

  <!-- Line 9: generating report -->
  <g class="line line9">
    <text x="64" y="308" font-family="monospace" font-size="12" fill="#c9d1d9">  📝 Generating stakeholder report...</text>
  </g>

  <!-- Line 10: posting comment -->
  <g class="line line10">
    <text x="64" y="332" font-family="monospace" font-size="12" fill="#c9d1d9">  💬 Calling tool: <tspan fill="#79c0ff">create_issue_comment</tspan><tspan fill="#c9d1d9"> (issue #42)</tspan></text>
  </g>

  <!-- Line 11: success -->
  <g class="line line11">
    <rect x="22" y="352" width="816" height="1" fill="#21262d"/>
    <text x="44" y="372" font-family="monospace" font-size="13" fill="#3fb950">✓  Daily Repo Status completed  (38s)</text>
  </g>

  <!-- Line 12: comment preview -->
  <g class="line line12">
    <rect x="44" y="390" width="770" height="68" rx="6" fill="#161b22" stroke="#238636" stroke-width="1"/>
    <text x="64" y="412" font-family="monospace" font-size="12" fill="#3fb950">💬 Posted comment:</text>
    <text x="64" y="432" font-family="monospace" font-size="11" fill="#c9d1d9">  ## Daily Repo Status — 3 high-priority issues · 1 stale PR needs review</text>
    <text x="64" y="450" font-family="monospace" font-size="11" fill="#8b949e">  Recommended actions: Triage #301, #318, #327 · Review PR #412 today</text>
  </g>

  <!-- Blinking cursor -->
  <rect class="cursor" x="30" y="462" width="8" height="14" fill="#c9d1d9"/>
</svg>
