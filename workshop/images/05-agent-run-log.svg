<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" role="img" aria-label="Animated GitHub Actions run showing four security jobs: activation validates the agent is authorized to run, agent runs with sandbox, firewall, and integrity filter enabled and saves results to safe outputs, detection scans for malicious code, and safe-outputs applies changes within guardrails">
  <title>Agentic workflow security jobs</title>
  <desc>A terminal-style log showing four GitHub Actions jobs: activation validates the agent is allowed to run, the agent job enables sandbox, firewall, and integrity filter and saves results to safe outputs, detection looks for malicious code in the output, and safe-outputs applies the changes within guardrails.</desc>

  <style>
    .line { opacity: 0; }
    .line1  { animation: fadein 0.4s 0.3s forwards; }
    .line2  { animation: fadein 0.4s 0.9s forwards; }
    .line3  { animation: fadein 0.4s 1.5s forwards; }
    .line4  { animation: fadein 0.4s 2.1s forwards; }
    .line5  { animation: fadein 0.4s 2.7s forwards; }
    .line6  { animation: fadein 0.4s 3.3s forwards; }
    .line7  { animation: fadein 0.4s 3.9s forwards; }
    .line8  { animation: fadein 0.4s 4.5s forwards; }
    .line9  { animation: fadein 0.4s 5.1s forwards; }
    .line10 { animation: fadein 0.4s 5.7s forwards; }
    .line11 { animation: fadein 0.4s 6.3s forwards; }
    .line12 { animation: fadein 0.4s 6.9s forwards; }
    .line13 { animation: fadein 0.4s 7.5s forwards; }
    .line14 { animation: fadein 0.4s 8.1s forwards; }
    .cursor { animation: blink 1s 0s infinite; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink  { 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
  </style>

  <!-- Terminal window background -->
  <rect width="860" height="480" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="40" rx="10" fill="#161b22"/>
  <rect x="0" y="20" width="860" height="20" fill="#161b22"/>
  <circle cx="22" cy="20" r="7" fill="#ff5f57"/>
  <circle cx="46" cy="20" r="7" fill="#febc2e"/>
  <circle cx="70" cy="20" r="7" fill="#28c840"/>
  <text x="430" y="25" font-family="Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Actions › Daily Repo Status › Run #7</text>

  <!-- activation job -->
  <g class="line line1">
    <text x="30" y="70" font-family="monospace" font-size="13" fill="#8b949e">▶  activation</text>
    <rect x="22" y="77" width="816" height="1" fill="#21262d"/>
  </g>
  <g class="line line2">
    <text x="44" y="98" font-family="monospace" font-size="12" fill="#3fb950">  ✅ Agent is authorized to run</text>
  </g>

  <!-- agent job -->
  <g class="line line3">
    <text x="30" y="128" font-family="monospace" font-size="13" fill="#8b949e">▶  agent</text>
    <rect x="22" y="135" width="816" height="1" fill="#21262d"/>
  </g>
  <g class="line line4">
    <text x="44" y="156" font-family="monospace" font-size="12" fill="#c9d1d9">  🔒 Sandbox:           <tspan fill="#3fb950">enabled</tspan></text>
  </g>
  <g class="line line5">
    <text x="44" y="178" font-family="monospace" font-size="12" fill="#c9d1d9">  🔥 Firewall:          <tspan fill="#3fb950">enabled</tspan></text>
  </g>
  <g class="line line6">
    <text x="44" y="200" font-family="monospace" font-size="12" fill="#c9d1d9">  🔍 Integrity filter:  <tspan fill="#3fb950">enabled</tspan></text>
  </g>
  <g class="line line7">
    <text x="44" y="222" font-family="monospace" font-size="12" fill="#c9d1d9">  💾 Saving results to safe outputs...</text>
  </g>

  <!-- detection job -->
  <g class="line line8">
    <text x="30" y="252" font-family="monospace" font-size="13" fill="#8b949e">▶  detection</text>
    <rect x="22" y="259" width="816" height="1" fill="#21262d"/>
  </g>
  <g class="line line9">
    <text x="44" y="280" font-family="monospace" font-size="12" fill="#c9d1d9">  🔎 Scanning output for malicious code...</text>
  </g>
  <g class="line line10">
    <text x="44" y="302" font-family="monospace" font-size="12" fill="#3fb950">  ✅ No threats detected</text>
  </g>

  <!-- safe-outputs job -->
  <g class="line line11">
    <text x="30" y="332" font-family="monospace" font-size="13" fill="#8b949e">▶  safe-outputs</text>
    <rect x="22" y="339" width="816" height="1" fill="#21262d"/>
  </g>
  <g class="line line12">
    <text x="44" y="360" font-family="monospace" font-size="12" fill="#c9d1d9">  🛡  Applying changes within guardrails...</text>
  </g>
  <g class="line line13">
    <text x="44" y="382" font-family="monospace" font-size="12" fill="#3fb950">  ✅ Changes applied safely</text>
  </g>

  <!-- Workflow complete -->
  <g class="line line14">
    <rect x="22" y="402" width="816" height="1" fill="#21262d"/>
    <text x="30" y="424" font-family="monospace" font-size="13" fill="#3fb950">✅ Workflow completed (34s)</text>
  </g>

  <!-- Blinking cursor -->
  <rect class="cursor" x="30" y="440" width="8" height="14" fill="#c9d1d9"/>
</svg>
