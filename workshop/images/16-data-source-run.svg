<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Actions run showing the fetch-issues step and updated summary">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Code</text>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Actions</text>
  <rect x="309" y="88" width="56" height="3" fill="#0969da" rx="2"/>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Breadcrumb -->
  <text x="80" y="125" font-family="Arial,sans-serif" font-size="13" fill="#0969da">Daily Repo Status</text>
  <text x="222" y="125" font-family="Arial,sans-serif" font-size="13" fill="#57606a"> / Run #12</text>
  <!-- Summary bar -->
  <rect x="60" y="135" width="1080" height="60" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="100" cy="165" r="16" fill="#1a7f37"/>
  <text x="100" y="171" font-family="Arial,sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">✓</text>
  <text x="130" y="158" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#1f2328">Daily Repo Status</text>
  <text x="130" y="178" font-family="Arial,sans-serif" font-size="12" fill="#57606a">Triggered via schedule  ·  completed in 1m 12s</text>
  <!-- Log panel -->
  <rect x="60" y="210" width="1080" height="310" rx="4" fill="#0d1117"/>
  <text x="80" y="240" font-family="monospace" font-size="13" fill="#3fb950">✓  Set up job</text>
  <text x="80" y="268" font-family="monospace" font-size="13" fill="#3fb950">✓  Run gh aw run  (58s)</text>
  <!-- fetch-issues highlighted -->
  <rect x="60" y="278" width="1080" height="52" fill="#1c2128"/>
  <text x="100" y="300" font-family="monospace" font-size="12" fill="#c9d1d9">    Calling tool: fetch_issues</text>
  <text x="100" y="320" font-family="monospace" font-size="12" fill="#c9d1d9">    Found 7 open issues  ·  2 closed today  ·  0 PRs open</text>
  <text x="80" y="360" font-family="monospace" font-size="12" fill="#c9d1d9">    Generating updated daily summary...</text>
  <text x="80" y="382" font-family="monospace" font-size="12" fill="#3fb950">    ✓ Summary written to workflow run page</text>
  <text x="80" y="415" font-family="monospace" font-size="13" fill="#3fb950">✓  Complete job</text>
  <text x="80" y="443" font-family="monospace" font-size="13" fill="#3fb950">✓  Post Set up job</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Actions run showing the fetch-issues step and updated summary</text>

</svg>