<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Workflow run summary panel">
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" rx="8" ry="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="200" y="10" width="800" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="26" font-family="Arial,sans-serif" font-size="12" fill="#57606a" text-anchor="middle">github.com/your-org/your-repo</text>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="1200" height="48" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Code</text>
  <text x="90" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Issues</text>
  <text x="168" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Pull requests</text>
  <text x="309" y="74" font-family="Arial,sans-serif" font-size="14" fill="#0969da" font-weight="bold">Actions</text>
  <rect x="309" y="88" width="56" height="3" fill="#0969da" rx="2"/>
  <text x="396" y="74" font-family="Arial,sans-serif" font-size="14" fill="#57606a" font-weight="normal">Settings</text>

  <!-- Breadcrumb -->
  <text x="80" y="125" font-family="Arial,sans-serif" font-size="13" fill="#0969da">Daily Report Status Workflow</text>
  <text x="250" y="125" font-family="Arial,sans-serif" font-size="13" fill="#57606a"> / Run #1</text>
  <!-- Summary header -->
  <rect x="60" y="135" width="1080" height="70" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="105" cy="170" r="20" fill="#1a7f37"/>
  <text x="105" y="178" font-family="Arial,sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">✓</text>
  <text x="140" y="162" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#1f2328">Daily Report Status Workflow</text>
  <text x="140" y="184" font-family="Arial,sans-serif" font-size="13" fill="#57606a">Triggered via workflow_dispatch  · 30 seconds ago  · completed in 45s</text>
  <!-- Jobs panel -->
  <rect x="60" y="220" width="280" height="220" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="80" y="248" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f2328">Jobs</text>
  <line x1="60" y1="256" x2="340" y2="256" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="90" cy="286" r="10" fill="#1a7f37"/>
  <text x="90" y="292" font-family="Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">✓</text>
  <text x="112" y="292" font-family="Arial,sans-serif" font-size="14" fill="#1f2328">run-agent</text>
  <!-- Log panel -->
  <rect x="360" y="220" width="780" height="220" rx="4" fill="#0d1117"/>
  <text x="380" y="250" font-family="monospace" font-size="13" fill="#3fb950">✓  Set up job</text>
  <text x="380" y="275" font-family="monospace" font-size="13" fill="#3fb950">✓  Run gh aw run daily-report-status.md</text>
  <text x="380" y="300" font-family="monospace" font-size="13" fill="#c9d1d9">    Hello from the agent!</text>
  <text x="380" y="325" font-family="monospace" font-size="13" fill="#3fb950">✓  Complete job</text>
  <text x="600" y="540" font-family="Arial,sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Workflow run summary panel</text>

</svg>