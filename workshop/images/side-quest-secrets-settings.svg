<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Repository secrets page">
  <!-- Page background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome header -->
  <rect x="0" y="0" width="1200" height="44" fill="#ffffff" rx="6" ry="6"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="44" fill="none" stroke="#d0d7de" stroke-width="1"/>
  <!-- URL bar -->
  <rect x="300" y="10" width="600" height="24" rx="4" ry="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#57606a">github.com / your-username / gh-aw-workshop / settings / secrets / actions</text>

  <!-- Tab bar -->
  <rect x="0" y="44" width="1200" height="40" fill="#ffffff" stroke="#d0d7de" stroke-width="0"/>
  <line x1="0" y1="84" x2="1200" y2="84" stroke="#d0d7de" stroke-width="1"/>
  <!-- Tabs -->
  <text x="40" y="68" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Code</text>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Issues</text>
  <text x="165" y="68" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Pull requests</text>
  <text x="270" y="68" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Actions</text>
  <text x="340" y="68" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Projects</text>
  <text x="408" y="68" font-family="Arial, sans-serif" font-size="13" fill="#24292f" font-weight="600">Settings</text>
  <line x1="400" y1="84" x2="450" y2="84" stroke="#0969da" stroke-width="2"/>

  <!-- Main content area -->
  <!-- Left sidebar -->
  <rect x="20" y="100" width="220" height="400" fill="#ffffff" rx="6" ry="6" stroke="#d0d7de" stroke-width="1"/>
  <text x="36" y="128" font-family="Arial, sans-serif" font-size="13" fill="#57606a">General</text>
  <text x="36" y="153" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Collaborators</text>
  <text x="36" y="178" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Branches</text>
  <text x="36" y="203" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Tags</text>
  <text x="36" y="228" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Actions</text>
  <!-- Secrets selected -->
  <rect x="20" y="242" width="220" height="28" fill="#ddf4ff" rx="0"/>
  <text x="36" y="261" font-family="Arial, sans-serif" font-size="13" fill="#0969da" font-weight="600">⬤  Secrets and variables</text>
  <text x="36" y="286" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Environments</text>
  <text x="36" y="311" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Pages</text>
  <text x="36" y="336" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Webhooks</text>

  <!-- Right content panel -->
  <rect x="260" y="100" width="920" height="400" fill="#ffffff" rx="6" ry="6" stroke="#d0d7de" stroke-width="1"/>

  <!-- Header row -->
  <text x="280" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#24292f">Actions secrets and variables</text>

  <!-- Tabs inside panel -->
  <text x="280" y="172" font-family="Arial, sans-serif" font-size="13" fill="#24292f" font-weight="600">Secrets</text>
  <line x1="280" y1="178" x2="320" y2="178" stroke="#0969da" stroke-width="2"/>
  <text x="340" y="172" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Variables</text>
  <line x1="280" y1="180" x2="1160" y2="180" stroke="#d0d7de" stroke-width="1"/>

  <!-- Repository secrets section -->
  <text x="280" y="208" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#24292f">Repository secrets</text>

  <!-- New secret button -->
  <rect x="1010" y="192" width="150" height="28" rx="6" ry="6" fill="#1f883d"/>
  <text x="1085" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">New repository secret</text>

  <!-- Description text -->
  <text x="280" y="228" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Secrets are encrypted environment variables used in GitHub Actions workflows.</text>

  <!-- Secret rows -->
  <rect x="280" y="242" width="880" height="44" fill="#f6f8fa" rx="6" ry="6" stroke="#d0d7de" stroke-width="1"/>
  <text x="310" y="269" font-family="Arial, sans-serif" font-size="13" fill="#24292f" font-weight="600">🔒  GITHUB_TOKEN</text>
  <text x="700" y="269" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Updated 2 days ago</text>
  <text x="1080" y="269" font-family="Arial, sans-serif" font-size="12" fill="#0969da">Update</text>

  <rect x="280" y="292" width="880" height="44" fill="#ffffff" rx="0" stroke="#d0d7de" stroke-width="1"/>
  <text x="310" y="319" font-family="Arial, sans-serif" font-size="13" fill="#24292f" font-weight="600">🔒  MY_API_KEY</text>
  <text x="700" y="319" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Updated 5 days ago</text>
  <text x="1040" y="319" font-family="Arial, sans-serif" font-size="12" fill="#0969da">Update</text>
  <text x="1095" y="319" font-family="Arial, sans-serif" font-size="12" fill="#cf222e">Remove</text>

  <rect x="280" y="336" width="880" height="44" fill="#f6f8fa" rx="0" stroke="#d0d7de" stroke-width="1"/>
  <text x="310" y="363" font-family="Arial, sans-serif" font-size="13" fill="#24292f" font-weight="600">🔒  SLACK_WEBHOOK_URL</text>
  <text x="700" y="363" font-family="Arial, sans-serif" font-size="12" fill="#57606a">Updated 12 days ago</text>
  <text x="1040" y="363" font-family="Arial, sans-serif" font-size="12" fill="#0969da">Update</text>
  <text x="1095" y="363" font-family="Arial, sans-serif" font-size="12" fill="#cf222e">Remove</text>

  <!-- Info box -->
  <rect x="280" y="392" width="880" height="44" rx="6" ry="6" fill="#ddf4ff" stroke="#54aeff" stroke-width="1"/>
  <text x="300" y="419" font-family="Arial, sans-serif" font-size="12" fill="#0969da">ℹ  Secrets are not passed to workflows triggered by a forked repository.</text>

  <!-- Annotation label -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#57606a">Repository secrets page</text>
</svg>
