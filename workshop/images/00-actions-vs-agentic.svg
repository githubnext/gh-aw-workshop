<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Side-by-side comparison of Classic GitHub Actions YAML versus an Agentic Workflow with safety highlights. Classic: schedule trigger flows through static YAML steps and shell scripts to produce output. Agentic: same trigger flows through a plain-English task brief with safety config (permissions, tools, safe-outputs) into a sandbox-isolated AI agent that applies integrity filtering and zero-secrets constraints, producing output only through declared safe-output surfaces.">
  <!-- Background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Title -->
  <text x="600" y="42" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#24292f" text-anchor="middle">Classic GitHub Actions vs Agentic Workflow</text>
  <text x="600" y="66" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#57606a" text-anchor="middle">Same trigger — safety built in: sandbox · zero secrets · integrity filtering · safe outputs.</text>

  <!-- LEFT PANEL — Classic Actions -->
  <rect x="40" y="88" width="510" height="420" rx="12" fill="white" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="40" y="88" width="510" height="48" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="40" y="112" width="510" height="24" fill="#f6f8fa"/>
  <text x="295" y="118" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#57606a" text-anchor="middle">BEFORE — Classic Actions YAML</text>

  <!-- Trigger box (left) -->
  <rect x="185" y="160" width="160" height="48" rx="8" fill="#ddf4ff" stroke="#54aeff" stroke-width="1.5"/>
  <text x="265" y="179" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#0550ae" text-anchor="middle">⏰ Schedule Trigger</text>
  <text x="265" y="197" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#0550ae" text-anchor="middle">cron: "0 8 * * *"</text>

  <!-- Arrow down -->
  <line x1="265" y1="208" x2="265" y2="232" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- YAML Steps box -->
  <rect x="155" y="232" width="220" height="96" rx="8" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <text x="265" y="252" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="#7d4e00" text-anchor="middle">📄 Static YAML Steps</text>
  <text x="265" y="270" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#7d4e00" text-anchor="middle">checkout → run script</text>
  <text x="265" y="286" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#7d4e00" text-anchor="middle">→ call API → format</text>
  <text x="265" y="302" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#7d4e00" text-anchor="middle">→ post comment</text>
  <text x="265" y="318" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#a57800" text-anchor="middle">~200 lines of YAML + shell</text>

  <!-- Arrow down -->
  <line x1="265" y1="328" x2="265" y2="352" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Shell Scripts dashed group -->
  <rect x="100" y="352" width="108" height="56" rx="6" fill="#fff0f0" stroke="#cf222e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="154" y="375" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#a40e26" text-anchor="middle">🐚 Shell Scripts</text>
  <text x="154" y="391" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#a40e26" text-anchor="middle">hard-coded logic</text>

  <rect x="322" y="352" width="108" height="56" rx="6" fill="#fff0f0" stroke="#cf222e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="376" y="375" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#a40e26" text-anchor="middle">🔧 API Calls</text>
  <text x="376" y="391" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#a40e26" text-anchor="middle">explicit plumbing</text>

  <!-- Arrows from YAML to scripts -->
  <line x1="220" y1="360" x2="208" y2="360" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="360" x2="322" y2="360" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows from scripts back down -->
  <line x1="154" y1="408" x2="154" y2="436" stroke="#57606a" stroke-width="1.5"/>
  <line x1="376" y1="408" x2="376" y2="436" stroke="#57606a" stroke-width="1.5"/>
  <line x1="154" y1="436" x2="265" y2="436" stroke="#57606a" stroke-width="1.5"/>
  <line x1="376" y1="436" x2="265" y2="436" stroke="#57606a" stroke-width="1.5"/>
  <line x1="265" y1="436" x2="265" y2="448" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output box left -->
  <rect x="185" y="448" width="160" height="44" rx="8" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="265" y="469" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#116329" text-anchor="middle">📋 Report Posted</text>
  <text x="265" y="484" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#116329" text-anchor="middle">but brittle to maintain</text>

  <!-- RIGHT PANEL — Agentic Workflow with Safety Model -->
  <rect x="650" y="88" width="510" height="420" rx="12" fill="white" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="650" y="88" width="510" height="48" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <rect x="650" y="112" width="510" height="24" fill="#f6f8fa"/>
  <text x="905" y="118" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#0969da" text-anchor="middle">AFTER — Agentic Workflow Markdown</text>

  <!-- Trigger box (right) -->
  <rect x="795" y="152" width="160" height="44" rx="8" fill="#ddf4ff" stroke="#54aeff" stroke-width="1.5"/>
  <text x="875" y="170" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#0550ae" text-anchor="middle">⏰ Schedule Trigger</text>
  <text x="875" y="187" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#0550ae" text-anchor="middle">cron: "0 8 * * *"</text>

  <!-- Arrow down -->
  <line x1="875" y1="196" x2="875" y2="208" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Task Brief + Safety Config box -->
  <rect x="738" y="208" width="274" height="88" rx="8" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <text x="875" y="227" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="#7d4e00" text-anchor="middle">📝 Task Brief + Safety Config</text>
  <text x="875" y="244" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#7d4e00" text-anchor="middle" font-style="italic">"Create a daily repo status update."</text>
  <text x="875" y="259" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#9a6700" text-anchor="middle">permissions: read  ·  tools: gh-proxy</text>
  <text x="875" y="274" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#9a6700" text-anchor="middle">safe-outputs: write-summary</text>
  <text x="875" y="289" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#a57800" text-anchor="middle">~20 lines of Markdown</text>

  <!-- Arrow down -->
  <line x1="875" y1="296" x2="875" y2="308" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Sandbox dashed container -->
  <rect x="664" y="308" width="482" height="152" rx="10" fill="#e8f4fd" stroke="#0284c7" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="684" y="326" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#0550ae">🏖️ Sandbox — isolated, ephemeral runner</text>

  <!-- AI Agent box inside sandbox -->
  <rect x="690" y="334" width="426" height="68" rx="10" fill="#fbefff" stroke="#8250df" stroke-width="2"/>
  <text x="903" y="354" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#6639ba" text-anchor="middle">🤖 AI Agent</text>
  <text x="903" y="371" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6639ba" text-anchor="middle">Reads live repo state · decides what matters</text>
  <text x="903" y="388" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8250df" text-anchor="middle">Uses only declared tools and permissions</text>

  <!-- Zero Secrets badge (inside sandbox, below agent) -->
  <rect x="706" y="412" width="116" height="22" rx="6" fill="#fff0f0" stroke="#cf222e" stroke-width="1.5"/>
  <text x="764" y="427" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#a40e26" text-anchor="middle">🔒 Zero Secrets</text>

  <!-- Integrity Filter badge (inside sandbox, below agent) -->
  <rect x="838" y="412" width="130" height="22" rx="6" fill="#ddf4ff" stroke="#0550ae" stroke-width="1.5"/>
  <text x="903" y="427" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#0550ae" text-anchor="middle">🔍 Integrity Filter</text>

  <!-- Arrow down from sandbox -->
  <line x1="875" y1="460" x2="875" y2="470" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Safe Outputs box -->
  <rect x="771" y="470" width="208" height="36" rx="8" fill="#dafbe1" stroke="#1a7f37" stroke-width="2"/>
  <text x="875" y="487" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="#116329" text-anchor="middle">📤 Safe Outputs</text>
  <text x="875" y="501" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#116329" text-anchor="middle">Report posted to declared write surface</text>

  <!-- VS divider -->
  <line x1="600" y1="88" x2="600" y2="508" stroke="#d0d7de" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="600" cy="298" r="20" fill="#24292f"/>
  <text x="600" y="303" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">VS</text>

  <!-- Bottom annotation -->
  <text x="600" y="536" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#57606a" text-anchor="middle">Safety is built in: sandbox isolation · no secret leakage · integrity filtering · safe-output surfaces enforced at runtime.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#57606a"/>
    </marker>
  </defs>
</svg>
