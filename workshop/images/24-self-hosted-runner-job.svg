<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Runner name shown in the Actions job summary">
  <!-- Page background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" fill="#ffffff" rx="8" ry="8"/>
  <rect x="0" y="22" width="1200" height="22" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="44" fill="none" stroke="#d0d7de" stroke-width="1"/>

  <!-- URL bar -->
  <rect x="200" y="10" width="800" height="24" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="27" font-family="Arial, sans-serif" font-size="13" fill="#57606a" text-anchor="middle">github.com / your-org / daily-status / actions / runs / 1234567890</text>

  <!-- Nav tabs background -->
  <rect x="0" y="44" width="1200" height="44" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>

  <!-- Repo name -->
  <text x="40" y="71" font-family="Arial, sans-serif" font-size="14" fill="#24292f" font-weight="600">your-org / daily-status</text>

  <!-- Nav tabs -->
  <text x="260" y="71" font-family="Arial, sans-serif" font-size="14" fill="#57606a">Code</text>
  <text x="310" y="71" font-family="Arial, sans-serif" font-size="14" fill="#57606a">Issues</text>
  <text x="360" y="71" font-family="Arial, sans-serif" font-size="14" fill="#57606a">Pull requests</text>
  <text x="460" y="71" font-family="Arial, sans-serif" font-size="14" fill="#0969da" font-weight="600">Actions</text>
  <rect x="460" y="84" width="52" height="3" fill="#0969da" rx="1"/>

  <!-- Content area -->
  <rect x="20" y="110" width="1160" height="400" fill="#ffffff" rx="6" stroke="#d0d7de" stroke-width="1"/>

  <!-- Workflow header -->
  <rect x="20" y="110" width="1160" height="52" fill="#f6f8fa" rx="6" stroke="#d0d7de" stroke-width="1"/>
  <rect x="20" y="128" width="1160" height="34" fill="#f6f8fa"/>

  <!-- Green check icon (circle) -->
  <circle cx="54" cy="136" r="14" fill="#1a7f37"/>
  <text x="54" y="141" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">✓</text>

  <text x="80" y="131" font-family="Arial, sans-serif" font-size="16" fill="#24292f" font-weight="600">daily-repo-status</text>
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="13" fill="#57606a">Triggered manually · 2 minutes ago · 1m 23s</text>

  <!-- Job summary panel -->
  <rect x="40" y="178" width="300" height="300" fill="#ffffff" rx="6" stroke="#d0d7de" stroke-width="1"/>
  <text x="60" y="205" font-family="Arial, sans-serif" font-size="14" fill="#24292f" font-weight="600">Jobs</text>

  <!-- Job item -->
  <rect x="40" y="215" width="300" height="40" fill="#f6f8fa" rx="4"/>
  <circle cx="62" cy="235" r="8" fill="#1a7f37"/>
  <text x="62" y="239" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">✓</text>
  <text x="80" y="239" font-family="Arial, sans-serif" font-size="14" fill="#0969da">generate-report</text>

  <!-- Summary panel on the right -->
  <rect x="360" y="178" width="800" height="300" fill="#ffffff" rx="6" stroke="#d0d7de" stroke-width="1"/>
  <text x="380" y="205" font-family="Arial, sans-serif" font-size="14" fill="#24292f" font-weight="600">Job summary</text>

  <!-- Summary table -->
  <rect x="380" y="218" width="760" height="1" fill="#d0d7de"/>

  <!-- Runner row — highlighted -->
  <rect x="360" y="260" width="800" height="44" fill="#fff8c5" rx="4"/>
  <text x="390" y="286" font-family="Arial, sans-serif" font-size="14" fill="#57606a" font-weight="600">Runner</text>
  <text x="600" y="286" font-family="monospace" font-size="14" fill="#24292f">my-self-hosted-runner</text>

  <!-- Callout arrow -->
  <line x1="780" y1="282" x2="870" y2="282" stroke="#0969da" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0969da"/>
    </marker>
  </defs>
  <rect x="874" y="265" width="260" height="36" rx="6" fill="#0969da"/>
  <text x="1004" y="287" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Your self-hosted runner name</text>

  <!-- Other rows -->
  <rect x="380" y="218" width="760" height="1" fill="#d0d7de"/>
  <text x="390" y="243" font-family="Arial, sans-serif" font-size="14" fill="#57606a" font-weight="600">OS</text>
  <text x="600" y="243" font-family="Arial, sans-serif" font-size="14" fill="#24292f">Ubuntu 22.04</text>

  <rect x="380" y="260" width="760" height="1" fill="#d0d7de"/>

  <rect x="380" y="302" width="760" height="1" fill="#d0d7de"/>
  <text x="390" y="326" font-family="Arial, sans-serif" font-size="14" fill="#57606a" font-weight="600">Duration</text>
  <text x="600" y="326" font-family="Arial, sans-serif" font-size="14" fill="#24292f">1m 23s</text>

  <rect x="380" y="344" width="760" height="1" fill="#d0d7de"/>
  <text x="390" y="368" font-family="Arial, sans-serif" font-size="14" fill="#57606a" font-weight="600">Triggered by</text>
  <text x="600" y="368" font-family="Arial, sans-serif" font-size="14" fill="#24292f">your-username (manual)</text>

  <rect x="380" y="386" width="760" height="1" fill="#d0d7de"/>
  <rect x="380" y="430" width="760" height="1" fill="#d0d7de"/>

  <!-- Annotation label -->
  <text x="600" y="535" font-family="Arial, sans-serif" font-size="24" fill="#57606a" text-anchor="middle">Runner name shown in the Actions job summary</text>
</svg>
