<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-label="Workflow run lifecycle: from triggering a manual dispatch through queued, running, and finished states, ending with the agent updating a repository issue">
  <!-- Background -->
  <rect width="1200" height="560" fill="#f6f8fa"/>

  <!-- Main card -->
  <rect x="40" y="40" width="1120" height="480" rx="12" ry="12" fill="white" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- Title -->
  <text x="600" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#24292f" text-anchor="middle">Workflow Run Lifecycle</text>
  <text x="600" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#57606a" text-anchor="middle">From manual trigger to agent output</text>

  <!-- ── Stage 1: Trigger ── -->
  <!-- Box -->
  <rect x="72" y="150" width="160" height="72" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <!-- Badge -->
  <circle cx="92" cy="168" r="11" fill="#0969da"/>
  <text x="92" y="173" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="152" y="174" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0969da" text-anchor="middle">Trigger</text>
  <text x="152" y="194" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Click Run workflow</text>
  <text x="152" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">in the Actions tab</text>

  <!-- Arrow 1→2 -->
  <line x1="232" y1="186" x2="286" y2="186" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Stage 2: Queued ── -->
  <rect x="286" y="150" width="160" height="72" rx="8" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <circle cx="306" cy="168" r="11" fill="#bf8700"/>
  <text x="306" y="173" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="366" y="174" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#bf8700" text-anchor="middle">Queued</text>
  <text x="366" y="194" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Run appears with</text>
  <text x="366" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">⏳ pending icon</text>

  <!-- Arrow 2→3 -->
  <line x1="446" y1="186" x2="500" y2="186" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Stage 3: Running ── -->
  <rect x="500" y="150" width="160" height="72" rx="8" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5"/>
  <circle cx="520" cy="168" r="11" fill="#bf8700"/>
  <text x="520" y="173" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="580" y="174" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#bf8700" text-anchor="middle">Running</text>
  <text x="580" y="194" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">🟡 Spinning icon;</text>
  <text x="580" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">live log updating</text>

  <!-- Arrow 3→4a (success, up-right) -->
  <line x1="660" y1="172" x2="714" y2="150" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Arrow 3→4b (failure, down-right) -->
  <line x1="660" y1="204" x2="714" y2="236" stroke="#cf222e" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- ── Stage 4a: Success ── -->
  <rect x="714" y="120" width="160" height="72" rx="8" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
  <circle cx="734" cy="138" r="11" fill="#1a7f37"/>
  <text x="734" y="143" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="794" y="144" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a7f37" text-anchor="middle">Success</text>
  <text x="794" y="164" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">✅ Green badge;</text>
  <text x="794" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">run complete</text>

  <!-- ── Stage 4b: Failure ── -->
  <rect x="714" y="210" width="160" height="72" rx="8" fill="#ffebe9" stroke="#cf222e" stroke-width="1.5"/>
  <circle cx="734" cy="228" r="11" fill="#cf222e"/>
  <text x="734" y="233" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="794" y="234" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#cf222e" text-anchor="middle">Failure</text>
  <text x="794" y="254" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">❌ Red badge;</text>
  <text x="794" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">see Step 8b logs</text>

  <!-- Arrow 4a→5 -->
  <line x1="874" y1="156" x2="940" y2="186" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ── Stage 5: Agent Output ── -->
  <rect x="940" y="150" width="180" height="72" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1.5"/>
  <circle cx="960" cy="168" r="11" fill="#8250df"/>
  <text x="960" y="173" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="1030" y="174" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8250df" text-anchor="middle">Agent Output</text>
  <text x="1030" y="194" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Issue updated or</text>
  <text x="1030" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">created by agent</text>

  <!-- ── Dashed group: "In GitHub Actions" ── -->
  <rect x="272" y="132" width="452" height="110" rx="8" fill="none" stroke="#57606a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="280" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#57606a">GitHub Actions runner</text>

  <!-- ── Agent loop annotation box ── -->
  <rect x="72" y="310" width="1056" height="100" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="600" y="334" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#24292f" text-anchor="middle">What happens inside stage 3 (Running)</text>
  <!-- Sub-steps -->
  <rect x="88" y="346" width="130" height="48" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
  <text x="153" y="367" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Agent reads</text>
  <text x="153" y="383" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">the brief</text>
  <line x1="218" y1="370" x2="248" y2="370" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <rect x="248" y="346" width="130" height="48" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
  <text x="313" y="367" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Agent plans</text>
  <text x="313" y="383" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">a response</text>
  <line x1="378" y1="370" x2="408" y2="370" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <rect x="408" y="346" width="150" height="48" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
  <text x="483" y="367" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Calls tools</text>
  <text x="483" y="383" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">(gh, curl, etc.)</text>
  <line x1="558" y1="370" x2="588" y2="370" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <rect x="588" y="346" width="150" height="48" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
  <text x="663" y="367" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Calls safe-output</text>
  <text x="663" y="383" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">tools to write</text>
  <line x1="738" y1="370" x2="768" y2="370" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <rect x="768" y="346" width="150" height="48" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
  <text x="843" y="367" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">Writes applied</text>
  <text x="843" y="383" font-family="system-ui, sans-serif" font-size="11" fill="#24292f" text-anchor="middle">to GitHub</text>
  <line x1="918" y1="370" x2="948" y2="370" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <rect x="948" y="346" width="160" height="48" rx="6" fill="#dafbe1" stroke="#1a7f37" stroke-width="1"/>
  <text x="1028" y="367" font-family="system-ui, sans-serif" font-size="11" fill="#1a7f37" text-anchor="middle">Runner exits</text>
  <text x="1028" y="383" font-family="system-ui, sans-serif" font-size="11" fill="#1a7f37" text-anchor="middle">successfully</text>

  <!-- Bottom caption -->
  <text x="600" y="496" font-family="system-ui, sans-serif" font-size="12" fill="#57606a" text-anchor="middle">A failed run at stage 4 means the agent encountered an error — check the log in Step 8b to diagnose it.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#57606a"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a7f37"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cf222e"/>
    </marker>
    <marker id="arrow-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#57606a"/>
    </marker>
  </defs>
</svg>
