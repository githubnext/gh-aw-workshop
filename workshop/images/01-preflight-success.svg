<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Terminal showing a successful pre-flight check with all green checkmarks">
  <rect width="1200" height="560" fill="#f6f8fa"/>
  <rect x="120" y="60" width="960" height="440" rx="16" fill="#0d1117"/>
  <rect x="120" y="60" width="960" height="44" rx="16" fill="#21262d"/>
  <text x="160" y="160" fill="#7ee787" font-family="monospace" font-size="22">student@machine:~$ gh --version &amp;&amp; echo "✅ gh CLI OK"</text>
  <text x="160" y="200" fill="#c9d1d9" font-family="monospace" font-size="22">gh version 2.72.0 (2025-04-01)</text>
  <text x="160" y="234" fill="#c9d1d9" font-family="monospace" font-size="22">✅ gh CLI OK</text>
  <text x="160" y="278" fill="#7ee787" font-family="monospace" font-size="22">student@machine:~$ gh auth status &amp;&amp; echo "✅ gh authenticated"</text>
  <text x="160" y="312" fill="#c9d1d9" font-family="monospace" font-size="22">  ✓ Logged in to github.com account yourname (keyring)</text>
  <text x="160" y="346" fill="#c9d1d9" font-family="monospace" font-size="22">✅ gh authenticated</text>
  <text x="160" y="390" fill="#7ee787" font-family="monospace" font-size="22">student@machine:~$ git --version &amp;&amp; echo "✅ git OK"</text>
  <text x="160" y="424" fill="#c9d1d9" font-family="monospace" font-size="22">git version 2.47.0</text>
  <text x="160" y="458" fill="#c9d1d9" font-family="monospace" font-size="22">✅ git OK</text>

  <rect x="840" y="205" width="215" height="50" rx="8" fill="#1a7f37"/>
  <text x="858" y="237" fill="#ffffff" font-family="Arial, sans-serif" font-size="26">All checks green</text>
  <line x1="840" y1="230" x2="680" y2="230" stroke="#1a7f37" stroke-width="4"/>

  <text x="120" y="530" fill="#57606a" font-family="Arial, sans-serif" font-size="24">Every line shows ✅ and the prompt returns — your environment is ready.</text>
</svg>
