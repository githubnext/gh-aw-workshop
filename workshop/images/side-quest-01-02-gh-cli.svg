      <rect x="84" y="156" width="520" height="290" rx="16" fill="#0d1117"/>
<text x="108" y="194" text-anchor="start" font-family="monospace" font-size="18" font-weight="400" fill="#7ee787">$ gh auth status</text>
<text x="108" y="226" text-anchor="start" font-family="monospace" font-size="18" font-weight="400" fill="#f0f6fc">✓ Logged in to github.com</text>
<text x="108" y="274" text-anchor="start" font-family="monospace" font-size="18" font-weight="400" fill="#7ee787">$ gh repo view --web</text>
<text x="108" y="306" text-anchor="start" font-family="monospace" font-size="18" font-weight="400" fill="#79c0ff">Opening repository in your browser…</text>
<text x="108" y="354" text-anchor="start" font-family="monospace" font-size="18" font-weight="400" fill="#7ee787">$ gh workflow list</text>
<text x="108" y="386" text-anchor="start" font-family="monospace" font-size="18" font-weight="400" fill="#f0f6fc">Daily Status Report     active</text>
<rect x="628" y="156" width="248" height="290" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
