<rect x="668" y="316" width="152" height="30" rx="15" fill="#fff8c5"/>
<text x="744.0" y="336" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#9a6700">Workflow commands</text>
