      <text x="480.0" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#57606a">A terminal tool for GitHub actions like auth checks, repo inspection, and workflow commands</text>
      <rect x="60" y="90" width="840" height="380" rx="18" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
