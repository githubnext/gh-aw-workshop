name: Create Participant Repository

on:
  workflow_dispatch:
    inputs:
      participant_username:
        description: GitHub username, or a comma-separated list of usernames
        required: true
        type: string
      participant_name:
        description: Optional display name used in the README greeting
        required: false
        type: string

jobs:
  create-repository:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out participant templates
        uses: actions/checkout@v5

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKSHOP_APP_ID }}
          private-key: ${{ secrets.WORKSHOP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Create repository and starter files
        id: bootstrap
        uses: actions/github-script@v7
        env:
          PARTICIPANT_REPO_SUFFIX: s-agentic-workflows
          PARTICIPANT_PERMISSION: push
          DEVCONTAINER_PATH: .devcontainer/devcontainer.json
          VSCODE_SETTINGS_PATH: .vscode/settings.json
          VSCODE_TASKS_PATH: .vscode/tasks.json
          GUIDE_IMAGE_PATH: images/open-my-guide.png
          PARTICIPANT_TEMPLATE_ROOT: .github/participant-template
          WORKSHOP_URL: https://githubnext.github.io/gh-aw-workshop/#04-github-actions-intro
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = await import('node:fs');
            const owner = context.repo.owner;
            const repoSuffix = process.env.PARTICIPANT_REPO_SUFFIX;
            const participantPermission = process.env.PARTICIPANT_PERMISSION;
            const devcontainerPath = process.env.DEVCONTAINER_PATH;
            const vscodeSettingsPath = process.env.VSCODE_SETTINGS_PATH;
            const vscodeTasksPath = process.env.VSCODE_TASKS_PATH;
            const guideImagePath = process.env.GUIDE_IMAGE_PATH;
            const participantTemplateRoot = process.env.PARTICIPANT_TEMPLATE_ROOT;
            const workshopUrl = process.env.WORKSHOP_URL;

            const sanitizeRepoName = (value) => value
              .toLowerCase()
              .replace(/[^a-z0-9._-]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .replace(/-{2,}/g, '-');

            const buildCodespaceUrl = (repoName, defaultBranch) =>
              `https://codespaces.new/${owner}/${repoName}/tree/${encodeURIComponent(defaultBranch)}?devcontainer_path=${encodeURIComponent(devcontainerPath)}&quickstart=1`;

            const readTemplate = (relativePath) =>
              fs.readFileSync(`${participantTemplateRoot}/${relativePath}`, 'utf8');

            const renderTemplate = (template, replacements) =>
              Object.entries(replacements).reduce(
                (content, [name, value]) => content.replaceAll(`{{${name}}}`, value),
                template
              );

            const readmeTemplate = readTemplate('README.md');
            const devcontainerContent = readTemplate(devcontainerPath);
            const vscodeSettingsContent = readTemplate(vscodeSettingsPath);
            const vscodeTasksContent = renderTemplate(readTemplate(vscodeTasksPath), {
              WORKSHOP_URL: workshopUrl
            });
            const guideImageContent = fs.readFileSync(`${participantTemplateRoot}/open-my-guide.png`);

            const buildReadme = (firstName, repoName, defaultBranch) => {
              const workshopCommandUrl = `command:workbench.action.tasks.runTask?${encodeURIComponent(JSON.stringify(['Open my Guide']))}`;
              return renderTemplate(readmeTemplate, {
                FIRST_NAME: firstName,
                CODESPACE_URL: buildCodespaceUrl(repoName, defaultBranch),
                WORKSHOP_COMMAND_URL: workshopCommandUrl,
                WORKSHOP_URL: workshopUrl
              });
            };


            const firstNameFrom = (value) => value
              .trim()
              .split(/\s+/)[0]
              .replace(/^./, (character) => character.toUpperCase());

            async function resolveFirstName(username, requestedDisplayName) {
              if (requestedDisplayName) {
                return firstNameFrom(requestedDisplayName);
              }

              try {
                const user = await withRetry(
                  () => github.rest.users.getByUsername({ username }),
                  `Reading the GitHub profile for ${username}`
                );
                if (user.data.name?.trim()) {
                  return firstNameFrom(user.data.name);
                }
              } catch (error) {
                core.warning(`Could not read the GitHub profile for ${username}: ${error.message}`);
              }

              return firstNameFrom(username.split(/[._-]/)[0]);
            }

            const isRetryableError = (error) =>
              !error.status || error.status === 429 || error.status >= 500;

            async function withRetry(operation, description, maxAttempts = 6) {
              for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
                try {
                  return await operation();
                } catch (error) {
                  if (!isRetryableError(error) || attempt === maxAttempts) {
                    throw error;
                  }

                  const retryAfterSeconds = Number(error.response?.headers?.['retry-after']);
                  const delayMs = Number.isFinite(retryAfterSeconds)
                    ? retryAfterSeconds * 1000
                    : Math.min(2000 * (2 ** (attempt - 1)), 30000);
                  core.warning(`${description} failed (${error.message}). Attempt ${attempt}/${maxAttempts}; retrying in ${delayMs}ms.`);
                  await new Promise((resolve) => setTimeout(resolve, delayMs));
                }
              }
            }

            async function upsertFile(repoName, defaultBranch, path, content, message) {
              const encodedContent = (Buffer.isBuffer(content) ? content : Buffer.from(content, 'utf8')).toString('base64');

              await withRetry(async () => {
                let sha;

                try {
                  const existingFile = await github.rest.repos.getContent({
                    owner,
                    repo: repoName,
                    path
                  });

                  if (!Array.isArray(existingFile.data) && existingFile.data.sha) {
                    sha = existingFile.data.sha;

                    if (existingFile.data.encoding === 'base64' && existingFile.data.content.replace(/\s/g, '') === encodedContent) {
                      core.info(`${path} is already up to date.`);
                      return;
                    }
                  }
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }

                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo: repoName,
                  path,
                  message,
                  content: encodedContent,
                  sha,
                  branch: defaultBranch
                });
              }, `Updating ${owner}/${repoName}/${path}`);
            }

            async function ensureParticipantRepository(username, firstName) {
              const repoName = sanitizeRepoName(`${username}${repoSuffix}`);
              if (!repoName) {
                throw new Error(`Unable to generate a repository name for ${username}.`);
              }

              let repo;
              let repoCreated = false;

              try {
                const existing = await github.rest.repos.get({ owner, repo: repoName });
                repo = existing.data;
                const defaultBranch = repo.default_branch || 'main';
                core.info(`Repository ${owner}/${repoName} already exists; skipping.`);
                return {
                  username,
                  repoCreated: false,
                  repoSkipped: true,
                  repoName,
                  repoUrl: repo.html_url,
                  codespaceUrl: buildCodespaceUrl(repoName, defaultBranch)
                };
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                let created;
                try {
                  created = await github.rest.repos.createInOrg({
                    org: owner,
                    name: repoName,
                    description: `Workshop repository for @${username}`,
                    private: true,
                    has_issues: true,
                    has_projects: false,
                    has_wiki: false,
                    auto_init: false
                  });
                } catch (createError) {
                  if (createError.status === 403) {
                    throw new Error(`Unable to create ${owner}/${repoName}. The GitHub App installation token does not have permission to create organization repositories in ${owner}.`);
                  }
                  throw createError;
                }

                repo = created.data;
                repoCreated = true;
                core.info(`Created repository ${repo.full_name}.`);
              }

              const defaultBranch = repo.default_branch || 'main';
              await upsertFile(repoName, defaultBranch, 'README.md', buildReadme(firstName, repoName, defaultBranch), 'Add participant welcome README');
              await upsertFile(repoName, defaultBranch, devcontainerPath, devcontainerContent, 'Add devcontainer for Codespaces');
              await upsertFile(repoName, defaultBranch, vscodeSettingsPath, vscodeSettingsContent, 'Allow automatic VS Code tasks');
              await upsertFile(repoName, defaultBranch, vscodeTasksPath, vscodeTasksContent, 'Add VS Code workshop task');
              await upsertFile(repoName, defaultBranch, guideImagePath, guideImageContent, 'Add workshop guide screenshot');

              try {
                await github.rest.repos.addCollaborator({
                  owner,
                  repo: repoName,
                  username,
                  permission: participantPermission
                });
              } catch (error) {
                core.warning(`Could not add collaborator ${username}: ${error.message}`);
              }

              return {
                username,
                repoCreated,
                repoSkipped: false,
                repoName,
                repoUrl: repo.html_url,
                codespaceUrl: buildCodespaceUrl(repoName, defaultBranch)
              };
            }

            function setOutputs({ participants, results = [] }) {
              core.setOutput('created_count', String(results.filter((result) => result.repoCreated).length));
              core.setOutput('skipped_count', String(results.filter((result) => result.repoSkipped).length));
              core.setOutput('skipped_repo_urls', results.filter((result) => result.repoSkipped).map((result) => result.repoUrl).join(' '));
              core.setOutput('processed_users', participants.join(', ') || 'none');
              core.setOutput('repo_urls', results.map((result) => result.repoUrl).join(' '));
              core.setOutput('codespace_urls', results.map((result) => result.codespaceUrl).join(' '));
            }

            const workflowInputs = context.payload.inputs || {};
            const seenUsernames = new Set();
            const usernames = (workflowInputs.participant_username || '')
              .split(',')
              .map((value) => value.trim().replace(/^@/, ''))
              .filter((username) => {
                const normalizedUsername = username.toLowerCase();
                if (!username || seenUsernames.has(normalizedUsername)) {
                  return false;
                }
                seenUsernames.add(normalizedUsername);
                return true;
              });
            if (usernames.length === 0) {
              core.setFailed('participant_username is required.');
              return;
            }

            const requestedDisplayName = (workflowInputs.participant_name || '').trim();
            const results = [];
            for (const username of usernames) {
              const firstName = await resolveFirstName(
                username,
                usernames.length === 1 ? requestedDisplayName : ''
              );
              results.push(await ensureParticipantRepository(username, firstName));
            }

            setOutputs({
              participants: usernames,
              results
            });

      - name: Write summary
        run: |
          {
            echo '## Participant repository workflow summary'
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- New repositories created: ${{ steps.bootstrap.outputs.created_count }}"
            echo "- Existing repositories skipped: ${{ steps.bootstrap.outputs.skipped_count }}"
            echo "- Participants handled: ${{ steps.bootstrap.outputs.processed_users }}"
            if [ -n "${{ steps.bootstrap.outputs.skipped_repo_urls }}" ]; then
              echo "- Skipped repositories: ${{ steps.bootstrap.outputs.skipped_repo_urls }}"
            fi
            if [ -n "${{ steps.bootstrap.outputs.repo_urls }}" ]; then
              echo "- Repositories: ${{ steps.bootstrap.outputs.repo_urls }}"
            fi
            if [ -n "${{ steps.bootstrap.outputs.codespace_urls }}" ]; then
              echo "- Codespaces links: ${{ steps.bootstrap.outputs.codespace_urls }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"