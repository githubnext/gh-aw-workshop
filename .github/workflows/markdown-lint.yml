name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-lint.yml"

permissions:
  contents: read
  issues: write

jobs:
  markdownlint:
    name: Lint Markdown (GFM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint markdown
        id: lint
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

      - name: File issue for lint failure on main
        if: steps.lint.outcome == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Markdown lint failure on main'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              'The markdown lint workflow failed on `main`.',
              '',
              `Workflow run: ${runUrl}`,
              '',
              'Please fix the markdown linting errors reported in this run.',
            ].join('\n')
            const { owner, repo } = context.repo
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })
            const existingIssue = issues.find(
              (issue) => issue.title === title && !issue.pull_request
            )
            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              })
            }

      - name: Fail job when lint fails
        if: steps.lint.outcome == 'failure'
        run: exit 1
