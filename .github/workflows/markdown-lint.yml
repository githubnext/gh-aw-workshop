name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-lint.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    name: Lint Markdown (GFM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
