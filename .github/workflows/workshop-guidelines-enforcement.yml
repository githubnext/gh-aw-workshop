name: Workshop Guidelines Enforcement

on:
  pull_request:
    paths:
      - "workshop/*.md"
      - ".github/workflows/guidelines.md"
      - ".github/workflows/workshop-guidelines-enforcement.yml"
  push:
    branches:
      - main
    paths:
      - "workshop/*.md"
      - ".github/workflows/guidelines.md"
      - ".github/workflows/workshop-guidelines-enforcement.yml"

permissions:
  contents: read

jobs:
  enforce:
    name: Enforce workshop guidelines
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate workshop markdown rules
        run: |
          set -euo pipefail

          mapfile -t files < <(find workshop -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workshop markdown files found."
            exit 0
          fi

          failed=0

          for file in "${files[@]}"; do
            numbered_headers=$(grep -nE '^[[:space:]]*#{1,6}[[:space:]]+[0-9]+' "$file" || true)
            if [ -n "$numbered_headers" ]; then
              echo "::error file=$file,title=Numbered headers are not allowed::Found numbered markdown headers. Use descriptive headers and keep ordering in lists/filenames."
              echo "$numbered_headers"
              failed=1
            fi

            nodejs_references=$(grep -nE '[Nn]ode\.?[Jj][Ss]|[Nn]ode[[:space:]]+--version' "$file" || true)
            if [ -n "$nodejs_references" ]; then
              echo "::error file=$file,title=Node.js references are not allowed::Remove Node.js prerequisites, install steps, or node version checks from workshop content."
              echo "$nodejs_references"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "Workshop guideline enforcement failed."
            exit 1
          fi

          echo "Workshop guideline checks passed."
