name: Local Image Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "workshop/images/**"
      - ".github/workflows/image-link-check.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "workshop/images/**"
      - ".github/workflows/image-link-check.yml"

permissions:
  contents: read
  issues: write

jobs:
  image-link-check:
    name: Check Local Image Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check local image links
        id: check
        continue-on-error: true
        run: |
          python3 - << 'PYEOF'
          import os
          import re
          import sys

          broken = []

          for root, dirs, files in os.walk('.'):
              # Skip hidden directories
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for filename in files:
                  if not filename.endswith('.md'):
                      continue
                  filepath = os.path.join(root, filename)
                  with open(filepath, encoding='utf-8') as f:
                      content = f.read()

                  # Remove fenced code blocks to avoid matching image syntax inside them
                  content_stripped = re.sub(r'```.*?```', '', content, flags=re.DOTALL)
                  content_stripped = re.sub(r'~~~.*?~~~', '', content_stripped, flags=re.DOTALL)

                  for i, line in enumerate(content_stripped.splitlines(), start=1):
                      for match in re.finditer(r'!\[.*?\]\(([^)]+)\)', line):
                          img_ref = match.group(1).strip()
                          # Only check local (non-URL) references
                          if img_ref.startswith('http://') or img_ref.startswith('https://'):
                              continue
                          # Strip any title attribute: e.g. "path/img.png \"title\""
                          img_path = img_ref.split()[0]
                          # Resolve relative to the markdown file's directory
                          base_dir = os.path.dirname(filepath)
                          resolved = os.path.normpath(os.path.join(base_dir, img_path))
                          if not os.path.exists(resolved):
                              broken.append((filepath.lstrip('./'), i, img_path, resolved.lstrip('./')))

          if broken:
              print(f"::error::Found {len(broken)} broken local image link(s):")
              for filepath, lineno, ref, resolved in broken:
                  print(f"::error file={filepath},line={lineno}::Broken image link: {ref} (resolved: {resolved})")
              sys.exit(1)
          else:
              count = sum(
                  len(re.findall(r'!\[.*?\]\([^)]+\)', open(os.path.join(r, f), encoding='utf-8').read()))
                  for r, _, files in os.walk('.')
                  for f in files if f.endswith('.md')
              )
              print(f"All local image links are valid. Checked across all markdown files.")
          PYEOF

      - name: File issue for broken images on main
        if: steps.check.outcome == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Broken local image links on main'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              'The local image link check failed on `main`.',
              '',
              `Workflow run: ${runUrl}`,
              '',
              'One or more markdown files reference image files that do not exist.',
              'Please fix the broken image links reported in the workflow run.',
            ].join('\n')
            const { owner, repo } = context.repo
            const { data: searchResults } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`,
              per_page: 10,
            })
            const existingIssue = searchResults.items.find(
              (issue) => issue.title === title
            )
            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              })
            }

      - name: Fail job when broken links found
        if: steps.check.outcome == 'failure'
        run: exit 1
