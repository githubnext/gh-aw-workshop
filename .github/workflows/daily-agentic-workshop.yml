name: Daily Agentic Workshop Builder

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-workshop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate workshop markdown
        run: |
          mkdir -p workshops
          template_path="workshops/agentic-workshop.template.md"
          output_path="workshops/agentic-workshop.md"

          if [ ! -f "${template_path}" ]; then
            echo "Template file not found: ${template_path}"
            exit 1
          fi

          day_of_week="$(date -u '+%u')"
          case "${day_of_week}" in
            1) focus="Define clear workflow success metrics and owner accountability." ;;
            2) focus="Refine developer prompts and validate agent guardrails." ;;
            3) focus="Review program milestones and cross-team dependencies." ;;
            4) focus="Map approval checkpoints and escalation paths." ;;
            5) focus="Assess adoption signals and collect workshop feedback." ;;
            6) focus="Capture reusable workflow patterns for next week." ;;
            7) focus="Prepare next-week objectives and backlog priorities." ;;
          esac

          cp "${template_path}" "${output_path}"
          {
            echo
            echo "## Daily Focus"
            echo "- ${focus}"
          } >> "${output_path}"

      - name: Commit workshop updates
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workshops/agentic-workshop.md
          git commit -m "chore: refresh daily agentic workshop content"
          git push
