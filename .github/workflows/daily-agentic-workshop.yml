name: Daily Agentic Workshop Builder

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-workshop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate workshop markdown
        run: |
          mkdir -p workshops
          cp workshops/agentic-workshop.template.md workshops/agentic-workshop.md

      - name: Commit workshop updates
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workshops/agentic-workshop.md
          git commit -m "chore: refresh daily agentic workshop content"
          git push
